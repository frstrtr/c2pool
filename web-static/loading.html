<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>c2pool — Starting Up</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
       background: #0a0a1a; color: #c9d1d9; display: flex; align-items: center;
       justify-content: center; min-height: 100vh; }
.container { text-align: center; max-width: 520px; padding: 40px 20px; }
h1 { font-size: 2rem; margin-bottom: 8px; color: #58a6ff; }
.version { font-size: 0.85rem; color: #666; margin-bottom: 32px; }
.spinner { width: 48px; height: 48px; border: 4px solid #222;
           border-top-color: #58a6ff; border-radius: 50%;
           animation: spin 1s linear infinite; margin: 0 auto 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
.status { font-size: 1.1rem; margin-bottom: 24px; color: #8b949e; }
.details { text-align: left; background: #111; border-radius: 8px;
           padding: 16px 20px; font-size: 0.9rem; line-height: 1.8; }
.details .row { display: flex; justify-content: space-between; }
.details .label { color: #8b949e; }
.details .val { color: #c9d1d9; font-family: monospace; }
.ok { color: #3fb950; }
.wait { color: #d29922; }
.note { margin-top: 24px; font-size: 0.8rem; color: #555; }
</style>
</head>
<body>
<div class="container">
    <h1>c2pool</h1>
    <div class="version">Decentralized Mining Pool</div>
    <div class="spinner"></div>
    <div class="status" id="status">Connecting...</div>
    <div class="details" id="details">
        <div class="row"><span class="label">Sharechain</span><span class="val" id="d-shares">...</span></div>
        <div class="row"><span class="label">Verified</span><span class="val" id="d-verified">...</span></div>
        <div class="row"><span class="label">Best share</span><span class="val" id="d-best">...</span></div>
        <div class="row"><span class="label">LTC SPV</span><span class="val" id="d-ltc-spv">...</span></div>
        <div class="row"><span class="label">DOGE SPV</span><span class="val" id="d-doge-spv">...</span></div>
        <div class="row"><span class="label">Uptime</span><span class="val" id="d-uptime">...</span></div>
    </div>
    <div class="note">This page auto-refreshes. You will be redirected to the dashboard when ready.</div>
    <div style="margin-top:16px;"><a href="dashboard.html" style="color:#555;font-size:0.8rem;text-decoration:underline;">Skip to dashboard anyway</a></div>
</div>
<script>
function poll() {
    // Fetch both sync_status and currency_info in parallel
    Promise.all([
        fetch('/web/sync_status').then(function(r){return r.json()}).catch(function(){return {}}),
        fetch('/web/currency_info').then(function(r){return r.json()}).catch(function(){return {}})
    ]).then(function(arr) {
        var d = arr[0], ci = arr[1];
        document.getElementById('d-shares').textContent = d.chain_size || 0;
        document.getElementById('d-shares').className = 'val ' + (d.has_shares ? 'ok' : 'wait');
        document.getElementById('d-verified').textContent = d.verified_size || 0;
        document.getElementById('d-verified').className = 'val ' + (d.verified_size > 0 ? 'ok' : 'wait');
        document.getElementById('d-best').textContent = d.has_best_share ? 'found' : 'syncing...';
        document.getElementById('d-best').className = 'val ' + (d.has_best_share ? 'ok' : 'wait');
        // Dashboard is truly ready when currency_info has real data
        var dashReady = ci.block_value != null && ci.block_value > 0
            && ci.pool_hash_rate != null && d.verified_size > 0;
        // SPV progress with ETA
        if (d.spv) {
            var ltcDone = d.spv.ltc_blocks >= d.spv.ltc_need;
            var ltcTxt = ltcDone ? 'ready' : d.spv.ltc_blocks + '/' + d.spv.ltc_need;
            if (!ltcDone && d.spv.ltc_blocks > 1 && d.uptime_seconds > 10) {
                var rate = d.spv.ltc_blocks / d.uptime_seconds;
                var remain = Math.ceil((d.spv.ltc_need - d.spv.ltc_blocks) / Math.max(rate, 0.01));
                ltcTxt += ' (~' + (remain > 60 ? Math.ceil(remain/60) + 'min' : remain + 's') + ')';
            }
            document.getElementById('d-ltc-spv').textContent = ltcTxt;
            document.getElementById('d-ltc-spv').className = 'val ' + (ltcDone ? 'ok' : 'wait');
            var dogeDone = d.spv.doge_blocks >= d.spv.doge_need;
            var dogeTxt = dogeDone ? 'ready' : d.spv.doge_blocks + '/' + d.spv.doge_need;
            if (!dogeDone && d.spv.doge_blocks > 1 && d.uptime_seconds > 10) {
                var dr = d.spv.doge_blocks / d.uptime_seconds;
                var drem = Math.ceil((d.spv.doge_need - d.spv.doge_blocks) / Math.max(dr, 0.01));
                dogeTxt += ' (~' + (drem > 60 ? Math.ceil(drem/60) + 'min' : drem + 's') + ')';
            }
            document.getElementById('d-doge-spv').textContent = dogeTxt;
            document.getElementById('d-doge-spv').className = 'val ' + (dogeDone ? 'ok' : 'wait');
        }
        var m = Math.floor((d.uptime_seconds || 0) / 60);
        var s = (d.uptime_seconds || 0) % 60;
        document.getElementById('d-uptime').textContent = m + 'm ' + s + 's';
        if (dashReady) {
            if (!window._readyCount) window._readyCount = 0;
            window._readyCount++;
            if (window._readyCount >= 3) {
                document.getElementById('status').textContent = 'Ready! Redirecting to dashboard...';
                document.getElementById('status').className = 'status ok';
                setTimeout(function() { window.location.href = 'dashboard.html'; }, 2000);
                return;
            }
            document.getElementById('status').textContent = 'Initializing dashboard... (' + window._readyCount + '/3)';
            document.getElementById('status').className = 'status ok';
        } else if (d.has_shares && d.verified_size > 0) {
            document.getElementById('status').textContent = 'Syncing embedded SPV nodes... (' + d.verified_size + ' shares verified)';
        } else if (d.has_shares) {
            document.getElementById('status').textContent = 'Syncing sharechain... ' + d.chain_size + ' shares';
        } else if (d.has_best_share) {
            document.getElementById('status').textContent = 'Connecting to p2pool network...';
        } else {
            document.getElementById('status').textContent = 'Syncing blockchain headers...';
        }
    })
        .catch(function() {
            document.getElementById('status').textContent = 'Waiting for c2pool to start...';
        });
}
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
