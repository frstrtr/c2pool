<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark light" />
<!-- CSP matches delta v1 §B.3. 'unsafe-inline' on style intentionally
     omitted — we use style attributes directly, allowed under 'self'. -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src 'self';
  connect-src 'self';
  img-src 'self' data:;
  style-src 'self' 'unsafe-inline';
  font-src 'self';
  frame-ancestors 'none';
  base-uri 'none';
  form-action 'none'
">
<title>c2pool sharechain explorer — demo</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0d0d1a; color: #e0e0f0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { padding: 12px 16px; border-bottom: 1px solid #3a3a5a; display: flex; align-items: center; gap: 12px; }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; }
  header .stats { font-size: 12px; color: #8888a0; font-family: Monaco, Consolas, monospace; }
  header button {
    background: #252540; color: #e0e0f0; border: 1px solid #3a3a5a;
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font: inherit;
  }
  header button:hover { background: #3a3a5a; }
  #grid-wrap { padding: 12px 16px; overflow-x: auto; }
  canvas { display: block; background: #0d0d1a; }
  footer { padding: 8px 16px; font-size: 11px; color: #8888a0; border-top: 1px solid #3a3a5a; }
  kbd { background: #252540; border: 1px solid #3a3a5a; border-radius: 3px; padding: 1px 6px; font-family: Monaco, Consolas, monospace; font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>c2pool sharechain explorer — demo</h1>
  <span class="stats" id="stats">0 shares</span>
  <button id="add-share">add share</button>
  <button id="rotate-hover">rotate hover</button>
  <button id="reset">reset</button>
</header>
<main id="grid-wrap">
  <canvas id="grid" aria-label="Share chain grid"></canvas>
</main>
<footer>
  Synthetic shares. Mouse over a cell to hover-highlight. <kbd>Shift+F12</kbd> for devtools in Qt builds.
</footer>
<script type="module" src="./demo.mjs"></script>
</body>
</html>
