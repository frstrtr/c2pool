<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c2pool Share</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <script type="text/javascript" src="d3.v2.min.js"></script>
    <script type="text/javascript" src="multipool.js"></script>
    <style>
        :root {
            --primary: #008de4;
            --primary-dark: #0066a9;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #1a1a2e;
            --darker: #16162a;
            --card-bg: #252540;
            --text: #e0e0e0;
            --text-muted: #8888a0;
            --border: #3a3a5a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .share-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .share-header a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
        }
        .share-header a:hover { text-decoration: underline; }
        .share-header .sep { color: var(--text-muted); font-size: 1.2rem; }
        .share-header .hash {
            font-family: 'Monaco','Consolas',monospace;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-all;
        }

        /* Navigation: parent/children */
        .share-nav {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .share-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .share-nav .nav-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .share-nav a {
            color: var(--primary);
            text-decoration: none;
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.85rem;
            background: var(--darker);
            padding: 3px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .share-nav a:hover {
            background: var(--primary);
            color: white;
        }

        /* Section cards */
        .detail-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .detail-section h2 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .detail-section h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 14px 0 8px 0;
        }

        /* Key-value rows */
        .kv-grid {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 6px 16px;
        }
        @media (max-width: 600px) {
            .kv-grid { grid-template-columns: 1fr; }
        }
        .kv-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .kv-value {
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .kv-value a {
            color: var(--primary);
            text-decoration: none;
        }
        .kv-value a:hover { text-decoration: underline; }

        /* Status badges */
        .badge-verified {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        .badge-unverified {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(85, 85, 119, 0.3);
            color: #8888a0;
        }
        .badge-stale {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        /* Transaction list */
        .tx-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }
        .tx-list a {
            color: var(--primary);
            text-decoration: none;
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.78rem;
            background: var(--darker);
            padding: 2px 6px;
            border-radius: 3px;
        }
        .tx-list a:hover {
            background: var(--primary);
            color: white;
        }

        /* Coinbase display */
        .coinbase-hex {
            background: var(--darker);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.78rem;
            word-break: break-all;
            line-height: 1.4;
            margin: 4px 0;
            max-height: 100px;
            overflow-y: auto;
        }
        .coinbase-ascii {
            color: var(--warning);
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.82rem;
        }

        /* Loading state */
        .loading-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--danger);
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-top: 30px;
        }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container" id="share-root">
        <div class="loading-msg">Loading share data...</div>
    </div>

    <footer>
        <p>c2pool | <a href=".">Dashboard</a> | <a href="https://github.com/frstrtr/c2pool" target="_blank">GitHub</a></p>
    </footer>

    <script type="text/javascript">
        function hex2a(hex) {
            var str = '';
            for (var i = 0; i < hex.length; i += 2) {
                var code = parseInt(hex.substr(i, 2), 16);
                str += code >= 32 && code <= 126 ? String.fromCharCode(code) : '.';
            }
            return str;
        }

        function target_to_difficulty(target) {
            return (0xffff0000 * Math.pow(2, 256 - 64) + 1) / (target + 1);
        }

        function format_difficulty(d) {
            if (d == null || !isFinite(d) || d <= 0) return '0';
            if (d < 1000) return d.toFixed(2);
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' K';
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' M';
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' G';
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' T';
            d = d / 1000;
            return d.toFixed(2) + ' P';
        }

        function format_time(ts) {
            var d = new Date(ts * 1000);
            var pad = function(n) { return n < 10 ? '0' + n : n; };
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' +
                   pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        function format_age(ts) {
            var secs = Math.floor(Date.now() / 1000 - ts);
            if (secs < 60) return secs + 's ago';
            if (secs < 3600) return Math.floor(secs/60) + 'm ' + (secs%60) + 's ago';
            if (secs < 86400) return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm ago';
            return Math.floor(secs/86400) + 'd ' + Math.floor((secs%86400)/3600) + 'h ago';
        }

        function esc(s) {
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function kv(label, value) {
            return '<div class="kv-label">' + esc(label) + '</div><div class="kv-value">' + value + '</div>';
        }

        var current_hash = null;

        function renderShare(share, currency_info) {
            var root = document.getElementById('share-root');
            var share_hash = document.location.hash.substr(1);
            var ci = currency_info || {};
            var addr_prefix = ci.address_explorer_url_prefix || '';
            var block_prefix = ci.block_explorer_url_prefix || '';
            var tx_prefix = ci.tx_explorer_url_prefix || '';
            var symbol = ci.symbol || 'LTC';

            if (!share || share.error) {
                root.innerHTML = '<div class="share-header">' +
                    '<a href=".">c2pool</a><span class="sep">&gt;</span>' +
                    '<span class="hash">' + esc(share_hash.substr(-16)) + '</span></div>' +
                    '<div class="error-msg">Share not found</div>';
                return;
            }

            var html = '';

            // Header
            html += '<div class="share-header">' +
                '<a href=".">c2pool</a>' +
                '<span class="sep">&gt;</span>' +
                '<span style="color:var(--text-muted);font-size:0.9rem">Share</span>' +
                '<span class="sep">&gt;</span>' +
                '<span class="hash">' + esc(share_hash.substr(-16)) + '</span>' +
                '<span style="color:var(--text-muted);font-size:0.82rem;margin-left:8px">' +
                    esc(share.type_name || '') + '</span>' +
                '</div>';

            // Navigation
            html += '<div class="share-nav">';
            html += '<div class="nav-item"><span class="nav-label">Parent:</span>' +
                '<a href="#' + share.parent + '">' + share.parent.substr(-8) + '</a></div>';
            html += '<div class="nav-item"><span class="nav-label">Far parent:</span>' +
                '<a href="#' + share.far_parent + '">' + share.far_parent.substr(-8) + '</a></div>';
            if (share.children && share.children.length > 0) {
                html += '<div class="nav-item"><span class="nav-label">Children:</span>';
                share.children.forEach(function(c) {
                    html += '<a href="#' + c + '">' + c.substr(-8) + '</a> ';
                });
                html += '</div>';
            }
            html += '</div>';

            // Share Data section
            var sd = share.share_data || {};
            html += '<div class="detail-section"><h2>Share Data</h2><div class="kv-grid">';
            html += kv('Timestamp', format_time(sd.timestamp) + ' <span style="color:var(--text-muted);font-size:0.78rem">(' + format_age(sd.timestamp) + ')</span>');
            html += kv('Difficulty', format_difficulty(target_to_difficulty(sd.target)));
            html += kv('Min Difficulty', format_difficulty(target_to_difficulty(sd.max_target)));

            var payoutAddr = sd.payout_address || '';
            var payoutLink = addr_prefix ? '<a href="' + addr_prefix + payoutAddr + '" target="_blank">' + esc(payoutAddr) + '</a>' : esc(payoutAddr);
            html += kv('Payout Address', payoutLink);
            // Donation field omitted — always 0 in V36+

            var staleHtml = '-';
            if (sd.stale_info === 'orphan' || sd.stale_info === 1) {
                staleHtml = '<span class="badge-stale">Orphan</span>';
            } else if (sd.stale_info === 'dead' || sd.stale_info === 2) {
                staleHtml = '<span class="badge-stale" style="background:rgba(220,53,69,0.2);color:#dc3545">Dead</span>';
            } else {
                staleHtml = '<span style="color:var(--success)">None</span>';
            }
            html += kv('Stale Info', staleHtml);
            html += kv('Nonce', sd.nonce != null ? sd.nonce : '-');
            html += kv('Desired Version', sd.desired_version != null ? 'V' + sd.desired_version : '-');
            html += kv('Absolute Height', sd.absheight != null ? sd.absheight : '-');
            html += kv('Absolute Work', sd.abswork || '-');
            html += '</div></div>';

            // Local Data section
            var local = share.local || {};
            html += '<div class="detail-section"><h2>Local Data</h2><div class="kv-grid">';
            var verBadge = local.verified
                ? '<span class="badge-verified">Verified</span>'
                : '<span class="badge-unverified">Unverified</span>';
            html += kv('Status', verBadge);
            html += kv('First Seen', local.time_first_seen ? format_time(local.time_first_seen) : '-');
            html += kv('From Peer', esc(local.peer_first_received_from || '-'));
            html += '</div></div>';

            // Block section
            var block = share.block || {};
            html += '<div class="detail-section"><h2>Block</h2><div class="kv-grid">';
            var blockHash = block.hash || '';
            var blockLink = block_prefix
                ? '<a href="' + block_prefix + blockHash + '" target="_blank">' + esc(blockHash) + '</a>'
                : esc(blockHash);
            html += kv('Block Hash', blockLink);
            html += '</div>';

            // Header sub-section
            var hdr = block.header || {};
            html += '<h3>Header</h3><div class="kv-grid">';
            html += kv('Version', hdr.version != null ? hdr.version + ' (0x' + hdr.version.toString(16) + ')' : '-');
            var prevLink = block_prefix
                ? '<a href="' + block_prefix + (hdr.previous_block || '') + '" target="_blank">' + esc(hdr.previous_block || '') + '</a>'
                : esc(hdr.previous_block || '');
            html += kv('Previous Block', prevLink);
            html += kv('Merkle Root', esc(hdr.merkle_root || '-'));
            html += kv('Timestamp', hdr.timestamp ? format_time(hdr.timestamp) : '-');
            html += kv('Difficulty', hdr.target != null ? format_difficulty(target_to_difficulty(hdr.target)) : '-');
            html += kv('Nonce', hdr.nonce != null ? hdr.nonce : '-');
            html += '</div>';

            // Generation TX
            var gentx = block.gentx || {};
            html += '<h3>Generation Transaction</h3><div class="kv-grid">';
            var txLink = tx_prefix
                ? '<a href="' + tx_prefix + (gentx.hash || '') + '" target="_blank">' + esc(gentx.hash || '') + '</a>'
                : esc(gentx.hash || '');
            html += kv('TX Hash', txLink);
            html += kv('Value', (gentx.value != null ? gentx.value : '-') + ' ' + symbol);
            html += kv('Txout Nonce', gentx.last_txout_nonce || '-');
            html += '</div>';

            if (gentx.coinbase) {
                html += '<h3>Coinbase</h3>';
                html += '<div class="coinbase-hex">' + esc(gentx.coinbase) + '</div>';
                html += '<div style="margin-top:4px"><span class="kv-label">ASCII: </span><span class="coinbase-ascii">' + esc(hex2a(gentx.coinbase)) + '</span></div>';
            }

            // Other transactions
            var others = block.other_transaction_hashes || [];
            if (others.length > 0) {
                html += '<h3>Other Transactions (' + others.length + ')</h3>';
                html += '<div class="tx-list">';
                others.forEach(function(txh, i) {
                    var link = tx_prefix ? tx_prefix + txh : '#';
                    html += '<a href="' + link + '" target="_blank">' + (i+1) + '</a>';
                });
                html += '</div>';
            }

            html += '</div>'; // close block section

            // V36 metadata
            if (share.v36_metadata) {
                var v36 = share.v36_metadata;
                html += '<div class="detail-section"><h2>V36 Merged Mining</h2><div class="kv-grid">';
                html += kv('Payout Hash', esc(v36.merged_payout_hash || '-'));
                html += kv('Message Size', v36.message_data_size || 0);
                html += '</div>';

                if (v36.merged_addresses && v36.merged_addresses.length > 0) {
                    html += '<h3>Merged Addresses</h3><div class="kv-grid">';
                    v36.merged_addresses.forEach(function(ma) {
                        var chainName = ma.chain_id === 98 ? 'DOGE' : 'Chain ' + ma.chain_id;
                        html += kv(chainName, esc(ma.address || ma.script_hex || '-'));
                    });
                    html += '</div>';
                }

                if (v36.messages && v36.messages.length > 0) {
                    html += '<h3>Embedded Messages</h3><div class="kv-grid">';
                    v36.messages.forEach(function(msg, i) {
                        html += kv('Message ' + (i+1), 'Type: 0x' + msg.type.toString(16) + ' Flags: 0x' + msg.flags.toString(16));
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            root.innerHTML = html;
        }

        function reload(currency_info) {
            var share_hash = document.location.hash.substr(1);
            if (!share_hash || share_hash === current_hash) return;
            current_hash = share_hash;

            document.getElementById('share-root').innerHTML = '<div class="loading-msg">Loading share ' + share_hash.substr(-16) + '...</div>';

            d3.json('../web/share/' + share_hash, function(share) {
                renderShare(share, currency_info);
            });
        }

        d3.json('../web/currency_info', function(currency_info) {
            reload(currency_info);
            // Watch for hash changes (navigation between shares)
            window.addEventListener('hashchange', function() {
                current_hash = null;
                reload(currency_info);
            });
            // Also poll slowly for data updates
            setInterval(function() { reload(currency_info); }, 5000);
        });
    </script>
</body>
</html>
