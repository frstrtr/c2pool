<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c2pool Share</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <script type="text/javascript" src="d3.v2.min.js"></script>
    <script type="text/javascript" src="multipool.js"></script>
    <style>
        :root {
            --primary: #008de4;
            --primary-dark: #0066a9;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #1a1a2e;
            --darker: #16162a;
            --card-bg: #252540;
            --text: #e0e0e0;
            --text-muted: #8888a0;
            --border: #3a3a5a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            max-width: 95vw;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .share-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .share-header a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
        }
        .share-header a:hover { text-decoration: underline; }
        .share-header .sep { color: var(--text-muted); font-size: 1.2rem; }
        .share-header .hash {
            font-family: 'Monaco','Consolas',monospace;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
            word-break: break-all;
        }

        /* Navigation: parent/children */
        .share-nav {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .share-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .share-nav .nav-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .share-nav a {
            color: var(--primary);
            text-decoration: none;
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.85rem;
            background: var(--darker);
            padding: 3px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .share-nav a:hover {
            background: var(--primary);
            color: white;
        }

        /* Section cards */
        .detail-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .detail-section h2 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .detail-section h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 14px 0 8px 0;
        }

        /* Key-value rows */
        .kv-grid {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 6px 16px;
        }
        @media (max-width: 600px) {
            .kv-grid { grid-template-columns: 1fr; }
        }
        .kv-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .kv-value {
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .kv-value a {
            color: var(--primary);
            text-decoration: none;
        }
        .kv-value a:hover { text-decoration: underline; }

        /* Status badges */
        .badge-verified {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        .badge-unverified {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(85, 85, 119, 0.3);
            color: #8888a0;
        }
        .badge-stale {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        /* Transaction list */
        .tx-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }
        .tx-list a {
            color: var(--primary);
            text-decoration: none;
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.78rem;
            background: var(--darker);
            padding: 2px 6px;
            border-radius: 3px;
        }
        .tx-list a:hover {
            background: var(--primary);
            color: white;
        }

        /* Coinbase display */
        .coinbase-hex {
            background: var(--darker);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.78rem;
            word-break: break-all;
            line-height: 1.4;
            margin: 4px 0;
            max-height: 100px;
            overflow-y: auto;
        }
        .coinbase-ascii {
            color: var(--warning);
            font-family: 'Monaco','Consolas',monospace;
            font-size: 0.82rem;
        }

        /* Loading state */
        .loading-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--danger);
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-top: 30px;
        }
        /* Block solution banners */
        .block-banner {
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
            text-align: center;
        }
        .block-banner.legendary {
            background: linear-gradient(135deg, rgba(255,128,0,0.2), rgba(204,102,0,0.15));
            border: 2px solid #ff8000;
            box-shadow: 0 0 20px rgba(255,128,0,0.3);
            animation: legendary-pulse 2s ease-in-out infinite;
        }
        .block-banner.ltc-block {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(200,170,0,0.1));
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.25);
        }
        .block-banner.doge-block {
            background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(0,180,200,0.08));
            border: 2px solid #00e5ff;
            box-shadow: 0 0 15px rgba(0,229,255,0.2);
        }
        @keyframes legendary-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,128,0,0.25); }
            50% { box-shadow: 0 0 30px rgba(255,128,0,0.5); }
        }
        .block-banner .banner-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .block-banner .banner-detail {
            font-size: 0.9rem;
            margin: 4px 0;
        }
        .block-banner a {
            color: inherit;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .block-banner a:hover { text-decoration-style: solid; }

        footer a { color: var(--primary); text-decoration: none; }

        /* PPLNS Treemap */
        .pplns-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .pplns-section h2 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .pplns-grid {
            position: relative;
            width: 100%;
            border-radius: 6px;
            overflow: visible;
        }
        .pplns-cell {
            position: absolute;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1),
                        box-shadow 0.2s ease, z-index 0s;
            transform-origin: center center;
            border: 2px solid rgba(0,0,0,0.4);
        }
        .pplns-cell:hover {
            transform: scale(1.15);
            z-index: 100;
            box-shadow: 0 0 20px 4px rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.5);
            filter: brightness(1.3) saturate(1.2);
        }
        .pplns-cell .pplns-pct {
            color: #fff;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0,0,0,1), 0 0 6px rgba(0,0,0,0.7), 0 0 12px rgba(0,0,0,0.4);
            line-height: 1.15;
        }
        .pplns-cell .pplns-addr {
            color: rgba(255,255,255,0.9);
            font-family: 'Monaco','Consolas',monospace;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,1), 0 0 6px rgba(0,0,0,0.7);
            line-height: 1.15;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 95%;
        }
        .pplns-cell.is-miner {
            border-color: #fff;
            box-shadow: inset 0 0 8px rgba(255,255,255,0.2);
        }
        #pplns-tooltip {
            display: none;
            position: fixed;
            z-index: 9999;
            background: #1e1e38;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            pointer-events: none;
            font-size: 0.82rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="container" id="share-root">
        <div class="loading-msg">Loading share data...</div>
    </div>

    <footer>
        <p>c2pool | <a href=".">Dashboard</a> | <a href="https://github.com/frstrtr/c2pool" target="_blank">GitHub</a></p>
    </footer>

    <script type="text/javascript">
        function hex2a(hex) {
            var str = '';
            for (var i = 0; i < hex.length; i += 2) {
                var code = parseInt(hex.substr(i, 2), 16);
                str += code >= 32 && code <= 126 ? String.fromCharCode(code) : '.';
            }
            return str;
        }

        function target_to_difficulty(target) {
            return (0xffff0000 * Math.pow(2, 256 - 64) + 1) / (target + 1);
        }

        function format_hashrate(h) {
            if (!h || h <= 0) return '0 H/s';
            var units = ['H/s','KH/s','MH/s','GH/s','TH/s','PH/s','EH/s'];
            var i = 0;
            while (h >= 1000 && i < units.length - 1) { h /= 1000; i++; }
            return h.toFixed(2) + ' ' + units[i];
        }

        function format_difficulty(d) {
            if (d == null || !isFinite(d) || d <= 0) return '0';
            if (d < 1000) return d.toFixed(2);
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' K';
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' M';
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' G';
            d = d / 1000;
            if (d < 1000) return d.toFixed(2) + ' T';
            d = d / 1000;
            return d.toFixed(2) + ' P';
        }

        function format_time(ts) {
            var d = new Date(ts * 1000);
            var pad = function(n) { return n < 10 ? '0' + n : n; };
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' +
                   pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        function format_age(ts) {
            var secs = Math.floor(Date.now() / 1000 - ts);
            if (secs < 60) return secs + 's ago';
            if (secs < 3600) return Math.floor(secs/60) + 'm ' + (secs%60) + 's ago';
            if (secs < 86400) return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm ago';
            return Math.floor(secs/86400) + 'd ' + Math.floor((secs%86400)/3600) + 'h ago';
        }

        function esc(s) {
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function kv(label, value) {
            return '<div class="kv-label">' + esc(label) + '</div><div class="kv-value">' + value + '</div>';
        }

        var current_hash = null;

        function renderShare(share, currency_info) {
            var root = document.getElementById('share-root');
            var share_hash = document.location.hash.substr(1);
            var ci = currency_info || {};
            var addr_prefix = ci.address_explorer_url_prefix || '';
            var block_prefix = ci.block_explorer_url_prefix || '';
            var tx_prefix = ci.tx_explorer_url_prefix || '';
            var symbol = ci.symbol || 'LTC';

            if (!share || share.error) {
                root.innerHTML = '<div class="share-header">' +
                    '<a href=".">c2pool</a><span class="sep">&gt;</span>' +
                    '<span class="hash">' + esc(share_hash.substr(-16)) + '</span></div>' +
                    '<div class="error-msg">Share not found</div>';
                return;
            }

            var html = '';

            // Header
            html += '<div class="share-header">' +
                '<a href=".">c2pool</a>' +
                '<span class="sep">&gt;</span>' +
                '<span style="color:var(--text-muted);font-size:0.9rem">Share</span>' +
                '<span class="sep">&gt;</span>' +
                '<span class="hash">' + esc(share_hash.substr(-16)) + '</span>' +
                '<span style="color:var(--text-muted);font-size:0.82rem;margin-left:8px">' +
                    esc(share.type_name || '') + '</span>' +
                '</div>';

            // Navigation
            html += '<div class="share-nav">';
            html += '<div class="nav-item"><span class="nav-label">Parent:</span>' +
                '<a href="#' + share.parent + '">' + share.parent.substr(-8) + '</a></div>';
            html += '<div class="nav-item"><span class="nav-label">Far parent:</span>' +
                '<a href="#' + share.far_parent + '">' + share.far_parent.substr(-8) + '</a></div>';
            if (share.children && share.children.length > 0) {
                html += '<div class="nav-item"><span class="nav-label">Children:</span>';
                share.children.forEach(function(c) {
                    html += '<a href="#' + c + '">' + c.substr(-8) + '</a> ';
                });
                html += '</div>';
            }
            html += '</div>';

            // Block solution banners
            var isLtcBlock = share.is_block_solution;
            var isDogeBlock = share.is_doge_block;
            var blockExplorer = block_prefix || 'https://blockchair.com/litecoin/block/';
            var dogeExplorer = 'https://blockchair.com/dogecoin/block/';

            if (isLtcBlock && isDogeBlock) {
                // LEGENDARY — twin block
                var db = share.doge_block || {};
                html += '<div class="block-banner legendary">';
                html += '<div class="banner-title" style="color:#ff8000">TWIN BLOCK — LEGENDARY</div>';
                html += '<div class="banner-detail" style="color:#ffd700">LTC Block: <a href="' + blockExplorer + share_hash + '" target="_blank">' + share_hash.substr(0, 20) + '…</a>';
                if (share.ltc_block_height) html += ' (height ' + share.ltc_block_height + ')';
                if (share.ltc_block_confirmations) html += ' — ' + share.ltc_block_confirmations + ' confirmations';
                html += '</div>';
                html += '<div class="banner-detail" style="color:#00e5ff">DOGE Block: <a href="' + dogeExplorer + (db.block_hash || '') + '" target="_blank">' + (db.block_hash || '').substr(0, 20) + '…</a>';
                if (db.height) html += ' (height ' + db.height + ')';
                if (db.reward) html += ' — ' + db.reward.toFixed(2) + ' DOGE reward';
                html += '</div>';
                html += '</div>';
            } else if (isLtcBlock) {
                html += '<div class="block-banner ltc-block">';
                html += '<div class="banner-title" style="color:#ffd700">LTC BLOCK SOLUTION</div>';
                html += '<div class="banner-detail" style="color:#ffd700">Block: <a href="' + blockExplorer + share_hash + '" target="_blank">' + share_hash.substr(0, 24) + '…</a>';
                if (share.ltc_block_height) html += ' (height ' + share.ltc_block_height + ')';
                if (share.ltc_block_confirmations) html += ' — ' + share.ltc_block_confirmations + ' confirmations';
                html += '</div>';
                var val = share.block && share.block.gentx ? share.block.gentx.value : null;
                if (val) html += '<div class="banner-detail" style="color:var(--text)">Block reward: ' + val.toFixed(8) + ' ' + symbol + '</div>';
                html += '</div>';
            } else if (isDogeBlock) {
                var db = share.doge_block || {};
                html += '<div class="block-banner doge-block">';
                html += '<div class="banner-title" style="color:#00e5ff">DOGE BLOCK SOLUTION</div>';
                html += '<div class="banner-detail" style="color:#00e5ff">Block: <a href="' + dogeExplorer + (db.block_hash || '') + '" target="_blank">' + (db.block_hash || '').substr(0, 24) + '…</a>';
                if (db.height) html += ' (height ' + db.height + ')';
                html += '</div>';
                if (db.reward) html += '<div class="banner-detail" style="color:var(--text)">Block reward: ' + db.reward.toFixed(2) + ' DOGE</div>';
                html += '</div>';
            }

            // Share Data section
            var sd = share.share_data || {};
            html += '<div class="detail-section"><h2>Share Data</h2><div class="kv-grid">';
            html += kv('Timestamp', format_time(sd.timestamp) + ' <span style="color:var(--text-muted);font-size:0.78rem">(' + sd.timestamp + ')</span>');
            html += kv('Age', '<span style="color:var(--primary);font-weight:600">' + format_age(sd.timestamp) + '</span>');
            html += kv('Difficulty', sd.difficulty != null ? format_difficulty(sd.difficulty) : format_difficulty(target_to_difficulty(sd.target)));
            html += kv('Min Difficulty', sd.min_difficulty != null ? format_difficulty(sd.min_difficulty) : format_difficulty(target_to_difficulty(sd.max_target)));

            var payoutAddr = sd.payout_address || '';
            var payoutLink = addr_prefix ? '<a href="' + addr_prefix + payoutAddr + '" target="_blank">' + esc(payoutAddr) + '</a>' : esc(payoutAddr);
            html += kv('Payout Address', payoutLink);
            html += kv('Donation', sd.donation != null ? (sd.donation * 100).toFixed(2) + '%' : '0.00%');

            var staleHtml = '-';
            if (sd.stale_info === 'orphan' || sd.stale_info === 1) {
                staleHtml = '<span class="badge-stale">Orphan</span>';
            } else if (sd.stale_info === 'dead' || sd.stale_info === 2) {
                staleHtml = '<span class="badge-stale" style="background:rgba(220,53,69,0.2);color:#dc3545">Dead</span>';
            } else {
                staleHtml = '<span style="color:var(--success)">None</span>';
            }
            html += kv('Last Stale', staleHtml);
            html += kv('Nonce', sd.nonce != null ? sd.nonce : '-');
            html += kv('Desired Version', sd.desired_version != null ? 'V' + sd.desired_version : '-');
            html += kv('Absolute Height', sd.absheight != null ? sd.absheight : '-');
            html += kv('Absolute Work', sd.abswork || '-');
            html += '</div></div>';

            // Local Data section
            var local = share.local || {};
            html += '<div class="detail-section"><h2>Local Data</h2><div class="kv-grid">';
            var verBadge = local.verified
                ? '<span class="badge-verified">Verified</span>'
                : '<span class="badge-unverified">Unverified</span>';
            html += kv('Status', verBadge);
            html += kv('First Seen', local.time_first_seen ? format_time(local.time_first_seen) : '-');
            html += kv('From Peer', esc(local.peer_first_received_from || '-'));
            html += '</div></div>';

            // Block section
            var block = share.block || {};
            html += '<div class="detail-section"><h2>Block</h2><div class="kv-grid">';
            var blockHash = block.hash || '';
            var blockLink = block_prefix
                ? '<a href="' + block_prefix + blockHash + '" target="_blank">' + esc(blockHash) + '</a>'
                : esc(blockHash);
            html += kv('Block Hash', blockLink);
            html += '</div>';

            // Header sub-section
            var hdr = block.header || {};
            html += '<h3>Header</h3><div class="kv-grid">';
            html += kv('Version', hdr.version != null ? hdr.version + ' (0x' + hdr.version.toString(16) + ')' : '-');
            var prevLink = block_prefix
                ? '<a href="' + block_prefix + (hdr.previous_block || '') + '" target="_blank">' + esc(hdr.previous_block || '') + '</a>'
                : esc(hdr.previous_block || '');
            html += kv('Previous Block', prevLink);
            html += kv('Merkle Root', esc(hdr.merkle_root || '-'));
            html += kv('Timestamp', hdr.timestamp ? format_time(hdr.timestamp) : '-');
            html += kv('Difficulty', hdr.target != null ? format_difficulty(target_to_difficulty(hdr.target)) : '-');
            html += kv('Nonce', hdr.nonce != null ? hdr.nonce : '-');
            html += '</div>';

            // Generation TX
            var gentx = block.gentx || {};
            html += '<h3>Generation Transaction</h3><div class="kv-grid">';
            var txLink = tx_prefix
                ? '<a href="' + tx_prefix + (gentx.hash || '') + '" target="_blank">' + esc(gentx.hash || '') + '</a>'
                : esc(gentx.hash || '');
            html += kv('TX Hash', txLink);
            html += kv('Value', (gentx.value != null ? gentx.value.toFixed(8) : '-') + ' ' + symbol);
            var txNonce = gentx.last_txout_nonce;
            var txNonceHex = txNonce ? '0x' + ('0000000000000000' + txNonce.toString(16)).slice(-16) : '-';
            html += kv('Last Txout Nonce', txNonceHex);
            html += '</div>';

            if (gentx.coinbase) {
                html += '<h3>Coinbase</h3>';
                html += '<div class="coinbase-hex">' + esc(gentx.coinbase) + '</div>';
                html += '<div style="margin-top:4px"><span class="kv-label">ASCII: </span><span class="coinbase-ascii">' + esc(hex2a(gentx.coinbase)) + '</span></div>';
            }

            // Other transactions
            var others = block.other_transaction_hashes || [];
            if (others.length > 0) {
                html += '<h3>Other Transactions (' + others.length + ')</h3>';
                html += '<div class="tx-list">';
                others.forEach(function(txh, i) {
                    var link = tx_prefix ? tx_prefix + txh : '#';
                    html += '<a href="' + link + '" target="_blank">' + (i+1) + '</a>';
                });
                html += '</div>';
            }

            html += '</div>'; // close block section

            // V36 metadata
            if (share.v36_metadata) {
                var v36 = share.v36_metadata;
                html += '<div class="detail-section"><h2>V36 Merged Mining</h2><div class="kv-grid">';
                html += kv('Payout Hash', esc(v36.merged_payout_hash || '-'));
                html += kv('Message Size', v36.message_data_size || 0);
                html += '</div>';

                if (v36.merged_addresses && v36.merged_addresses.length > 0) {
                    html += '<h3>Merged Addresses</h3><div class="kv-grid">';
                    v36.merged_addresses.forEach(function(ma) {
                        var chainName = ma.chain_id === 98 ? 'DOGE' : 'Chain ' + ma.chain_id;
                        html += kv(chainName, esc(ma.address || ma.script_hex || '-'));
                    });
                    html += '</div>';
                }

                if (v36.messages && v36.messages.length > 0) {
                    html += '<h3>Embedded Messages</h3><div class="kv-grid">';
                    v36.messages.forEach(function(msg, i) {
                        html += kv('Message ' + (i+1), 'Type: 0x' + msg.type.toString(16) + ' Flags: 0x' + msg.flags.toString(16));
                    });
                    html += '</div>';
                }

                html += '</div>';
            }

            // PPLNS treemap section — DOM-based for CSS transitions
            html += '<div class="pplns-section"><h2>PPLNS Distribution</h2>' +
                '<div class="pplns-grid" id="pplns-grid"></div>' +
                '<div id="pplns-tooltip"></div></div>';

            root.innerHTML = html;

            // Load sharechain window (includes per-share PPLNS cache) for treemap
            d3.json('../sharechain/window', function(winData) {
                if (!winData) return;
                var grid = document.getElementById('pplns-grid');
                if (!grid) return;
                var tooltip = document.getElementById('pplns-tooltip');

                // Build per-miner version stats from window data
                var minerVersions = {};
                if (winData.shares) {
                    var verCounts = {};
                    winData.shares.forEach(function(s) {
                        if (!verCounts[s.m]) verCounts[s.m] = { v: {}, d: {} };
                        verCounts[s.m].v[s.V] = (verCounts[s.m].v[s.V] || 0) + 1;
                        if (s.dv) verCounts[s.m].d[s.dv] = (verCounts[s.m].d[s.dv] || 0) + 1;
                    });
                    for (var addr in verCounts) {
                        var vc = verCounts[addr];
                        var topVer = 0, topVerN = 0;
                        for (var v in vc.v) { if (vc.v[v] > topVerN) { topVer = parseInt(v); topVerN = vc.v[v]; } }
                        var topDv = 0, topDvN = 0;
                        for (var d in vc.d) { if (vc.d[d] > topDvN) { topDv = parseInt(d); topDvN = vc.d[d]; } }
                        minerVersions[addr] = { ver: topVer, dv: topDv || topVer };
                    }
                }

                // Use per-share PPLNS from server cache (exact for this share's position)
                var shortHash = share_hash.substr(0, 16);
                var sharePplns = null;
                if (winData.pplns && winData.pplns[shortHash]) {
                    sharePplns = winData.pplns[shortHash];
                } else if (winData.pplns_current) {
                    sharePplns = winData.pplns_current;
                }
                if (!sharePplns) return;

                // Fetch merged payouts to get DOGE data
                d3.json('../current_merged_payouts', function(mergedPayouts) {
                // Build DOGE lookup from merged payouts
                var dogeLookup = {};
                if (mergedPayouts && typeof mergedPayouts === 'object') {
                    for (var mAddr in mergedPayouts) {
                        var mp = mergedPayouts[mAddr];
                        if (mp.merged && mp.merged.length > 0) {
                            mp.merged.forEach(function(m) {
                                if (m.symbol === 'DOGE') {
                                    dogeLookup[mAddr] = { amt: m.amount || 0, addr: m.address || '' };
                                }
                            });
                        }
                    }
                }

                // Parse per-share PPLNS + merge DOGE data
                var total = 0;
                var entries = [];
                for (var addr in sharePplns) {
                    var ltcAmt = sharePplns[addr];
                    total += ltcAmt;
                    var doge = dogeLookup[addr] || { amt: 0, addr: '' };
                    entries.push({ addr: addr, amt: ltcAmt, doge: doge.amt, dogeAddr: doge.addr });
                }
                entries.sort(function(a, b) { return b.amt - a.amt; });
                entries.forEach(function(e) { e.pct = total > 0 ? e.amt / total : 0; });
                var dogeTotal = 0;
                entries.forEach(function(e) { dogeTotal += e.doge; });

                // Compute per-miner hashrate from sharechain window data
                var minerHR = {};
                if (winData.shares && winData.shares.length >= 2) {
                    var diffSums = {};
                    winData.shares.forEach(function(s) {
                        if (!diffSums[s.m]) diffSums[s.m] = 0;
                        if (s.b) {
                            var nSize = s.b >>> 24, nWord = s.b & 0x00ffffff;
                            var diff = (0xffff0000 * Math.pow(2, 256-64) + 1) / (nWord * Math.pow(2, 8*(nSize-3)) + 1);
                            diffSums[s.m] += diff;
                        }
                    });
                    var newest = winData.shares[0].t;
                    var oldest = winData.shares[winData.shares.length-1].t;
                    var span = Math.max(newest - oldest, 1);
                    for (var m in diffSums) {
                        minerHR[m] = diffSums[m] * 4294967296 / span;
                    }
                }

                    var w = grid.clientWidth;
                    var vh = window.innerHeight || document.documentElement.clientHeight;
                    var h = Math.max(400, Math.min(w * 0.5, vh * 0.7));
                    grid.style.height = h + 'px';

                    var rects = pplnsTreemap(entries, 0, 0, w, h);
                    var minerAddr = (share && share.share_data) ? share.share_data.payout_address : '';
                    var addrPrefix = ci.address_explorer_url_prefix || 'https://blockchair.com/litecoin/address/';

                    rects.forEach(function(r) {
                        var isThis = r.addr === minerAddr;
                        var hue = addrHue(r.addr);
                        var lightness = isThis ? 45 : 32;
                        var saturation = isThis ? 75 : 45;
                        var mv = minerVersions[r.addr] || {};

                        var cell = document.createElement('div');
                        cell.className = 'pplns-cell' + (isThis ? ' is-miner' : '');
                        cell.style.left = r.x + 'px';
                        cell.style.top = r.y + 'px';
                        cell.style.width = r.w + 'px';
                        cell.style.height = r.h + 'px';
                        cell.style.background = 'hsl('+hue+','+saturation+'%,'+lightness+'%)';

                        // Scale font sizes to fit the rectangle
                        var pctSize = Math.max(10, Math.min(r.w / 5, r.h / 3, 32));
                        var addrSize = Math.max(7, Math.min(pctSize * 0.6, r.w / 12, 14));
                        var verSize = Math.max(7, Math.min(pctSize * 0.45, 11));

                        var hasDoge = r.doge > 0;
                        var isV35Only = mv.ver && mv.ver < 36 && (!mv.dv || mv.dv < 36);

                        // Clamp font sizes to actually fit in the cell
                        var fitPct = Math.max(8, Math.min(r.w / 6, r.h / 5, 28));
                        var fitAddr = Math.max(6, Math.min(fitPct * 0.5, r.w / 14, 12));
                        var fitVer = Math.max(6, Math.min(fitPct * 0.4, 10));

                        // LTC percentage
                        if (r.w > 28 && r.h > 14) {
                            var pctEl = document.createElement('div');
                            pctEl.className = 'pplns-pct';
                            pctEl.style.fontSize = fitPct + 'px';
                            pctEl.textContent = (r.pct * 100).toFixed(1) + '%';
                            cell.appendChild(pctEl);
                        }

                        // DOGE percentage — same size, right below
                        if (r.w > 35 && r.h > 28) {
                            var dogeEl = document.createElement('div');
                            dogeEl.className = 'pplns-pct';
                            dogeEl.style.fontSize = Math.max(8, fitPct * 0.85) + 'px';
                            if (hasDoge) {
                                var dogePct = dogeTotal > 0 ? (r.doge / dogeTotal * 100).toFixed(1) : '0';
                                dogeEl.style.color = '#ffd700';
                                dogeEl.textContent = dogePct + '% D';
                            } else if (isV35Only) {
                                dogeEl.style.color = '#ff6b6b';
                                dogeEl.textContent = r.w > 55 ? 'NO DOGE' : '0% D';
                            } else {
                                dogeEl.style.color = 'rgba(255,255,255,0.3)';
                                dogeEl.textContent = '\u2014';
                            }
                            cell.appendChild(dogeEl);
                        }

                        // Address label
                        if (r.w > 45 && r.h > 45) {
                            var addrEl = document.createElement('div');
                            addrEl.className = 'pplns-addr';
                            addrEl.style.fontSize = fitAddr + 'px';
                            var maxChars = Math.max(4, Math.floor(r.w / (fitAddr * 0.65)));
                            addrEl.textContent = r.addr.length > maxChars
                                ? r.addr.substr(0, maxChars) + '…'
                                : r.addr;
                            cell.appendChild(addrEl);
                        }

                        // Version tag — only if enough vertical space
                        if (r.w > 30 && r.h > 55 && mv.ver) {
                            var verEl = document.createElement('div');
                            verEl.style.fontSize = fitVer + 'px';
                            verEl.style.lineHeight = '1.1';
                            verEl.style.marginTop = '1px';
                            if (mv.dv && mv.dv !== mv.ver) {
                                verEl.style.color = '#4dd0e1';
                                verEl.style.textShadow = '0 1px 3px rgba(0,0,0,0.9)';
                                verEl.style.fontWeight = '700';
                                verEl.textContent = 'V' + mv.ver + '\u2192V' + mv.dv;
                            } else if (isV35Only) {
                                verEl.style.color = '#ff6b6b';
                                verEl.style.textShadow = '0 1px 3px rgba(0,0,0,0.9)';
                                verEl.style.fontWeight = '700';
                                verEl.textContent = 'V' + mv.ver;
                            } else {
                                verEl.style.color = 'rgba(255,255,255,0.4)';
                                verEl.style.textShadow = '0 1px 2px rgba(0,0,0,0.6)';
                                verEl.textContent = 'V' + mv.ver;
                            }
                            cell.appendChild(verEl);
                        }

                        // V35-only cells get desaturated + red border
                        if (isV35Only) {
                            cell.style.filter = 'saturate(0.4) brightness(0.85)';
                            cell.style.borderColor = 'rgba(220,53,69,0.6)';
                        }

                        // Click → blockchair
                        cell.addEventListener('click', function() {
                            window.open(addrPrefix + r.addr, '_blank');
                        });

                        // Tooltip — matches dashboard PPLNS treemap format
                        var _hasDoge = hasDoge, _isV35Only = isV35Only, _mv = mv;
                        cell.addEventListener('mouseenter', function(ev) {
                            var verLine = '';
                            if (_mv.ver) {
                                if (_mv.dv && _mv.dv !== _mv.ver) {
                                    verLine = '<div style="color:#4dd0e1;font-weight:600">V' + _mv.ver + ' \u2192 V' + _mv.dv + '</div>';
                                } else if (_isV35Only) {
                                    verLine = '<div style="color:#ff6b6b;font-weight:700">V' + _mv.ver + ' ONLY \u2014 missing DOGE!</div>';
                                } else {
                                    verLine = '<div style="color:var(--success)">V' + _mv.ver + '</div>';
                                }
                            }
                            var dogeLine = '';
                            if (_hasDoge) {
                                var dogePct = dogeTotal > 0 ? (r.doge / dogeTotal * 100).toFixed(2) : '0';
                                dogeLine = '<div style="color:#ffd700;font-weight:700">' + dogePct + '% \u2014 ' + r.doge.toFixed(2) + ' DOGE</div>';
                                if (r.dogeAddr) {
                                    dogeLine += '<div style="color:var(--text-muted);font-size:0.78em;font-family:Monaco,Consolas,monospace">\u2192 ' + esc(r.dogeAddr) + '</div>';
                                }
                            } else if (_isV35Only) {
                                dogeLine = '<div style="color:#ff6b6b;font-weight:600">0 DOGE \u2014 upgrade to V36!</div>';
                            }
                            var hrLine = '';
                            if (minerHR[r.addr]) {
                                hrLine = '<div style="color:var(--text-secondary)">' + format_hashrate(minerHR[r.addr]) + '</div>';
                            }
                            tooltip.innerHTML = '<div style="color:var(--primary);font-weight:700;margin-bottom:4px">' + esc(r.addr) + '</div>' +
                                '<div style="font-weight:600">' + (r.pct*100).toFixed(2) + '% \u2014 ' + r.amt.toFixed(8) + ' LTC</div>' +
                                dogeLine + hrLine + verLine +
                                '<div style="color:var(--text-muted);font-size:0.75em;margin-top:4px">Click to view on Blockchair</div>';
                            tooltip.style.display = 'block';
                        });
                        cell.addEventListener('mousemove', function(ev) {
                            tooltip.style.left = (ev.clientX + 14) + 'px';
                            tooltip.style.top = (ev.clientY + 14) + 'px';
                        });
                        cell.addEventListener('mouseleave', function() {
                            tooltip.style.display = 'none';
                        });

                        grid.appendChild(cell);
                    });
                }); // end d3.json current_merged_payouts
                }); // end d3.json sharechain/window
        }

        // Treemap helpers for share.html
        function addrHue(addr) {
            var h = 0;
            for (var i = 0; i < addr.length; i++) h = ((h << 5) - h + addr.charCodeAt(i)) | 0;
            return ((h % 360) + 360) % 360;
        }

        function pplnsTreemap(data, x, y, w, h) {
            var rects = [];
            var items = data.map(function(d) { return { addr: d.addr, pct: d.pct, amt: d.amt, doge: d.doge || 0, dogeAddr: d.dogeAddr || '', area: d.pct }; });
            _tmLayout(items, x, y, w, h, rects);
            return rects;
        }

        function _tmLayout(items, x, y, w, h, rects) {
            if (items.length === 0 || w <= 0 || h <= 0) return;
            var totalArea = 0;
            items.forEach(function(it) { totalArea += it.area; });
            if (totalArea <= 0) return;
            var vertical = w >= h;
            var mainSize = vertical ? h : w;
            var crossSize = vertical ? w : h;
            var row = [], rowArea = 0, remaining = items.slice();

            while (remaining.length > 0) {
                row.push(remaining[0]);
                rowArea += remaining[0].area;
                remaining.shift();
                if (remaining.length === 0) break;
                var stripNow = (rowArea / totalArea) * crossSize;
                var stripNext = ((rowArea + remaining[0].area) / totalArea) * crossSize;
                var worstNow = _tmWorst(row, rowArea, stripNow, mainSize);
                var worstNext = _tmWorst(row.concat([remaining[0]]), rowArea + remaining[0].area, stripNext, mainSize);
                if (worstNext > worstNow && row.length >= 1) break;
            }
            var stripSize = Math.max(1, (rowArea / totalArea) * crossSize);
            var offset = 0;
            for (var i = 0; i < row.length; i++) {
                var sz = (row[i].area / rowArea) * mainSize;
                if (vertical) rects.push({ x: x, y: y+offset, w: stripSize, h: sz, addr: row[i].addr, pct: row[i].pct, amt: row[i].amt, doge: row[i].doge, dogeAddr: row[i].dogeAddr });
                else rects.push({ x: x+offset, y: y, w: sz, h: stripSize, addr: row[i].addr, pct: row[i].pct, amt: row[i].amt, doge: row[i].doge, dogeAddr: row[i].dogeAddr });
                offset += sz;
            }
            if (remaining.length > 0) {
                if (vertical) _tmLayout(remaining, x+stripSize, y, w-stripSize, h, rects);
                else _tmLayout(remaining, x, y+stripSize, w, h-stripSize, rects);
            }
        }

        function _tmWorst(row, rowArea, strip, main) {
            var worst = 0;
            for (var i = 0; i < row.length; i++) {
                var sz = (row[i].area / rowArea) * main;
                var a = Math.max(sz / strip, strip / sz);
                if (a > worst) worst = a;
            }
            return worst;
        }

        function reload(currency_info) {
            var share_hash = document.location.hash.substr(1);
            if (!share_hash || share_hash === current_hash) return;
            current_hash = share_hash;

            document.getElementById('share-root').innerHTML = '<div class="loading-msg">Loading share ' + share_hash.substr(-16) + '...</div>';

            d3.json('../web/share/' + share_hash, function(share) {
                renderShare(share, currency_info);
            });
        }

        d3.json('../web/currency_info', function(currency_info) {
            reload(currency_info);
            // Watch for hash changes (navigation between shares)
            window.addEventListener('hashchange', function() {
                current_hash = null;
                reload(currency_info);
            });
            // Also poll slowly for data updates
            setInterval(function() { reload(currency_info); }, 5000);
        });
    </script>
</body>
