<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c2pool Graphs</title>
    <link rel="stylesheet" href="style.css">
    <script src="c2pool.js"></script>
</head>
<body>

<header>
    <div class="header-content">
        <div class="logo">
            <h1>c2pool</h1>
            <span class="symbol-badge" id="header-symbol">LTC</span>
        </div>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="graphs.html" class="active">Graphs</a>
            <a href="share.html">Share Explorer</a>
        </nav>
    </div>
</header>

<div class="container">

    <!-- ── Hashrate chart ────────────────────────────── -->
    <div class="table-container">
        <div class="section-header">
            <h2>&#x1F4C8; Pool Hashrate</h2>
        </div>
        <div style="padding:16px">
            <canvas id="chart-hashrate" height="200"></canvas>
            <div class="empty-state" id="chart-hashrate-fallback">
                Collecting data points… The chart will appear once enough samples are available.
            </div>
        </div>
    </div>

    <!-- ── Miner distribution chart ──────────────────── -->
    <div class="table-container" style="margin-top:16px">
        <div class="section-header">
            <h2>&#x26CF; Sharechain — Miners by Share Count</h2>
        </div>
        <div style="padding:16px">
            <canvas id="chart-miners" height="200"></canvas>
            <div class="empty-state" id="chart-miners-fallback">
                Loading sharechain data…
            </div>
        </div>
    </div>

    <!-- ── Sharechain timeline ───────────────────────── -->
    <div class="table-container" style="margin-top:16px">
        <div class="section-header">
            <h2>&#x23F1; Sharechain Timeline</h2>
        </div>
        <div id="timeline" style="overflow-x:auto;padding:8px"></div>
    </div>

    <!-- ── Live stats table ──────────────────────────── -->
    <div class="table-container" style="margin-top:16px">
        <div class="section-header">
            <h2>&#x1F4CA; Live Statistics</h2>
        </div>
        <table>
            <tbody id="stats-table"></tbody>
        </table>
    </div>

</div>

<footer>
    <span id="version-text">c2pool</span> &mdash;
    <a href="https://github.com/frstrtr/c2pool" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>

<script>
// Simple in-memory time-series for hashrate (no backend graph_data endpoints needed)
const MAX_POINTS = 120; // 20 minutes at 10s interval
let hashrateHistory = [];

function drawSimpleChart(canvasId, data, label, unit) {
    const canvas = document.getElementById(canvasId);
    if (!canvas || !canvas.getContext) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.parentElement.clientWidth - 32;
    const H = 200;
    canvas.width = W;
    canvas.height = H;
    ctx.clearRect(0, 0, W, H);

    if (data.length < 2) return;

    const maxVal = Math.max(...data.map(d => d.value)) * 1.1 || 1;
    const minVal = 0;

    // Grid
    ctx.strokeStyle = "rgba(58, 58, 90, 0.6)";
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
        const y = H - (i / 4) * H;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }

    // Line
    ctx.strokeStyle = "#008de4";
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((d, i) => {
        const x = (i / (data.length - 1)) * W;
        const y = H - ((d.value - minVal) / (maxVal - minVal || 1)) * H;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Fill
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = "rgba(0, 141, 228, 0.08)";
    ctx.fill();

    // Y-axis label
    ctx.fillStyle = "#8888a0";
    ctx.font = "11px sans-serif";
    ctx.fillText(C2PoolAPI.formatHashrate(maxVal), 4, 14);
    ctx.fillText("0", 4, H - 4);
}

function drawMinerBars(data) {
    const canvas = document.getElementById("chart-miners");
    if (!canvas || !canvas.getContext) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.parentElement.clientWidth - 32;
    const H = 200;
    canvas.width = W;
    canvas.height = H;
    ctx.clearRect(0, 0, W, H);

    const entries = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, 20);
    if (entries.length === 0) return;

    const maxVal = entries[0][1] || 1;
    const barH = Math.min(30, (H - 20) / entries.length);
    const colors = ["#008de4", "#28a745", "#ffc107", "#dc3545", "#a371f7",
                    "#79c0ff", "#56d364", "#e3b341", "#ffa198", "#bc8cff"];

    entries.forEach(([miner, count], i) => {
        const w = (count / maxVal) * (W - 160);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fillRect(4, i * barH + 2, w, barH - 4);
        ctx.fillStyle = "#e0e0e0";
        ctx.font = "11px monospace";
        const label = miner.length > 16 ? miner.substring(0, 16) + "…" : miner;
        ctx.fillText(label + " (" + count + ")", w + 10, i * barH + barH / 2 + 4);
    });

    document.getElementById("chart-miners-fallback").style.display = "none";
}

function drawTimeline(timeline) {
    const el = document.getElementById("timeline");
    if (!timeline || timeline.length === 0) {
        el.textContent = "";
        const span = document.createElement("span");
        span.className = "empty-state";
        span.textContent = "No timeline data.";
        el.appendChild(span);
        return;
    }
    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");
    ["Time", "Shares", "Miners"].forEach(h => {
        const th = document.createElement("th");
        th.textContent = h;
        headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);
    const tbody = document.createElement("tbody");
    timeline.forEach(slot => {
        const tr = document.createElement("tr");
        const time = new Date(slot.timestamp * 1000).toLocaleTimeString();
        const miners = slot.miner_distribution ? Object.keys(slot.miner_distribution).length : 0;
        [time, String(slot.share_count), String(miners)].forEach(text => {
            const td = document.createElement("td");
            td.textContent = text;
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    el.textContent = "";
    el.appendChild(table);
}

async function refreshGraphs() {
    try {
        // Hashrate history
        const lr = await C2PoolAPI.localRate();
        if (lr != null) {
            hashrateHistory.push({ time: Date.now(), value: lr });
            if (hashrateHistory.length > MAX_POINTS) hashrateHistory.shift();
        }

        if (hashrateHistory.length >= 2) {
            document.getElementById("chart-hashrate-fallback").style.display = "none";
            drawSimpleChart("chart-hashrate", hashrateHistory, "Pool hashrate", "H/s");
        }

        // Sharechain stats — miner distribution + timeline
        const sc = await C2PoolAPI.sharechainStats();
        if (sc) {
            if (sc.shares_by_miner && Object.keys(sc.shares_by_miner).length > 0) {
                drawMinerBars(sc.shares_by_miner);
            }
            if (sc.timeline) {
                drawTimeline(sc.timeline);
            }
        }

        // Live stats table
        const data = await C2PoolAPI.fetchAll();
        const stats = [];
        stats.push(["Pool hashrate", C2PoolAPI.formatHashrate(data.localRate)]);
        stats.push(["Network hashrate", C2PoolAPI.formatHashrate(data.globalRate)]);
        stats.push(["Connected miners", data.users != null ? data.users : "—"]);
        stats.push(["Pool fee", data.fee != null ? data.fee + "%" : "—"]);
        stats.push(["Uptime", C2PoolAPI.formatDuration(data.uptime)]);
        if (data.sharechainStats) {
            stats.push(["Shares in chain", data.sharechainStats.total_shares || "—"]);
            stats.push(["Chain height", data.sharechainStats.chain_height || "—"]);
        }
        const tbody = document.getElementById("stats-table");
        tbody.textContent = "";
        stats.forEach(([k, v]) => {
            const tr = document.createElement("tr");
            const tdK = document.createElement("td");
            tdK.style.color = "var(--text-muted)";
            tdK.textContent = k;
            const tdV = document.createElement("td");
            tdV.textContent = String(v);
            tr.appendChild(tdK);
            tr.appendChild(tdV);
            tbody.appendChild(tr);
        });

        // Currency info
        const ci = data.currencyInfo;
        if (ci && ci.symbol) {
            document.getElementById("header-symbol").textContent = ci.symbol;
            document.title = "c2pool " + ci.symbol + " Graphs";
        }

        // Version footer
        if (data.version && data.version.version) {
            document.getElementById("version-text").textContent = data.version.version;
        }

    } catch (e) {
        console.error("Graphs refresh error:", e);
    }

    setTimeout(refreshGraphs, 10000);
}

refreshGraphs();
</script>

</body>
</html>
