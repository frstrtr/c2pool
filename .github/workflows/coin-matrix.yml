name: Coin matrix

# Per the multi-coin landing strategy (2026-05-24): every PR builds AND
# smoke-tests every coin binary that exists on the branch. A core change
# that regresses any coin fails at PR review time, not weeks later at
# merge. This is what makes single-master safe — human cross-coin review
# does not scale.
#
# Forward-compatible: each coin's job activates when src/c2pool/main_<coin>.cpp
# + src/impl/<coin>/ are present. On master today only `btc` will run
# (when this lands on master via Bucket-B's CMake glue + main_<coin>.cpp
# split, the other coins activate automatically without YAML changes).

on:
  push:
    branches: [master, btc-embedded, dash-spv-embedded, dgb/pool-pillars-port, windows-build, service-update]
  pull_request:
    branches: [master, btc-embedded, dash-spv-embedded, dgb/slice4-skeleton, dgb/pool-pillars-port]

# Concurrency: a newer run on the same ref cancels the stale in-progress
# one, cutting concurrent load on the shared self-hosted pool (the OOM/
# oversubscription root cause, not just queue depth). Per-ref group so
# distinct PRs/branches never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  coin:
    name: ${{ matrix.coin }} smoke (Linux x86_64)
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","Linux","X64","c2pool-build"]') || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        coin: [ltc, doge, dash, btc, dgb, bch]
    steps:
      - uses: actions/checkout@v6

      - name: Set per-job Conan home
        run: |
          # github-hosted: ephemeral per-job home, warmed by actions/cache below.
          # self-hosted:   PERSISTENT home keyed on the runner instance. A runner
          # executes one job at a time, so this home is never contended (no
          # sqlite "failed to acquire database lock in 20s") while still keeping
          # the per-job isolation of #704/#710 -- no two concurrent jobs share it.
          # Being persistent, it also takes the GH cache-service restore off the
          # hot path: that restore times out on VM905 ("Failed to restore: The
          # operation cannot be completed in timeout") and its miss cascaded into
          # a cold from-source Boost rebuild on all 8 runners at once.
          if [ "${{ runner.environment }}" = "github-hosted" ]; then
            echo "CONAN_HOME=$RUNNER_TEMP/conan2" >> "$GITHUB_ENV"
          else
            echo "CONAN_HOME=$HOME/.conan2-ci/$RUNNER_NAME" >> "$GITHUB_ENV"
          fi

      - name: Check source presence
        id: presence
        run: |
          if [ -f "src/c2pool/main_${{ matrix.coin }}.cpp" ] && [ -d "src/impl/${{ matrix.coin }}" ]; then
            echo "exists=1" >> "$GITHUB_OUTPUT"
            echo "::notice::c2pool-${{ matrix.coin }} source present — building."
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
            echo "::notice::c2pool-${{ matrix.coin }} source not on this branch — skipping (expected until that coin's split lands)."
          fi

      - name: Install system dependencies
        if: steps.presence.outputs.exists == '1' && runner.environment == 'github-hosted'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make libleveldb-dev libsecp256k1-dev

      - uses: actions/setup-python@v6
        if: steps.presence.outputs.exists == '1'
        with: { python-version: '3.12' }

      - name: Install Conan 2
        if: steps.presence.outputs.exists == '1'
        run: |
          if [ "${{ runner.environment }}" = "github-hosted" ]; then
            pip install "conan>=2.0,<3.0"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            conan --version   # pre-provisioned at /usr/local/bin on self-hosted
          fi

      - name: Show committed Conan profile
        if: steps.presence.outputs.exists == '1'
        run: conan profile show -pr:a=ci/conan/linux-gcc13.profile

      - name: Restore Conan cache (github-hosted only)
        if: runner.environment == 'github-hosted'
        if: steps.presence.outputs.exists == '1'
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/conan2
          key: conan2-ubuntu24-gcc13-${{ matrix.coin }}-${{ hashFiles('conanfile.txt', 'ci/conan/linux-gcc13.profile', 'conan.lock') }}
          restore-keys: |
            conan2-ubuntu24-gcc13-${{ matrix.coin }}-
            conan2-ubuntu24-gcc13-

      - name: Clean stale build dir (self-hosted workspace is reused)
        if: steps.presence.outputs.exists == '1' && runner.environment != 'github-hosted'
        run: rm -rf build_${{ matrix.coin }}

      - name: Clear orphaned Conan download tempfiles (self-hosted cache is reused)
        if: steps.presence.outputs.exists == '1' && runner.environment != 'github-hosted'
        # An interrupted or racing conan download can leave a partial conan_package.tgz
        # in $CONAN_HOME that makes the next `conan install` abort with
        # "the file to download already exists". Delete these staging archives so a
        # missing binary package can be re-fetched cleanly; extracted packages are untouched.
        run: |
          find "$CONAN_HOME/p" -type f \( -name 'conan_package.tgz' -o -name 'conan_sources.tgz' \) -delete 2>/dev/null || true

      - name: Conan install
        if: steps.presence.outputs.exists == '1'
        run: |
          # Bounded retry: remote package downloads are the only network step
          # left here; a transient CDN/remote hiccup must not red a good PR.
          for attempt in 1 2 3; do
            if \
            conan install . \
              -pr:a=ci/conan/linux-gcc13.profile \
              --lockfile=conan.lock \
              --build=missing \
              --output-folder=build_${{ matrix.coin }} \
              --settings=build_type=Release
            then exit 0; fi
            echo "conan install failed (attempt $attempt/3); retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "conan install failed after 3 attempts" >&2
          exit 1

      - name: Configure
        if: steps.presence.outputs.exists == '1'
        run: |
          cmake -S . -B build_${{ matrix.coin }} \
            -DCMAKE_TOOLCHAIN_FILE=build_${{ matrix.coin }}/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build c2pool-${{ matrix.coin }}
        if: steps.presence.outputs.exists == '1'
        run: cmake --build build_${{ matrix.coin }} --target c2pool-${{ matrix.coin }} -j$(nproc)

      - name: Smoke test (--help)
        if: steps.presence.outputs.exists == '1'
        run: |
          BIN=build_${{ matrix.coin }}/src/c2pool/c2pool-${{ matrix.coin }}
          file "$BIN"
          "$BIN" --help 2>&1 | head -5 || true

      - name: Upload build artifacts on failure
        if: failure() && steps.presence.outputs.exists == '1'
        uses: actions/upload-artifact@v7
        with:
          name: coin-matrix-${{ matrix.coin }}-fail
          path: |
            build_${{ matrix.coin }}/CMakeFiles/CMakeOutput.log
            build_${{ matrix.coin }}/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore
