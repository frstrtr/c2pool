name: CI

on:
  push:
    branches: [master, p2pool-v36-compat, qt-control-panel-design]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Ubuntu 24.04 / GCC 13 / Debug
    runs-on: ubuntu-24.04
    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules — plain clone is sufficient.

      # ── 2. System dependencies (not provided by Conan) ────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make \
            libleveldb-dev \
            libsecp256k1-dev

      # ── 3. Python / Conan 2 ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile (GCC 13 + C++20)
        run: |
          conan profile detect --force
          # Override cppstd to match CMakeLists.txt (CMAKE_CXX_STANDARD 20)
          sed -i 's/compiler.cppstd=.*/compiler.cppstd=20/' \
            "$(conan profile path default)"
          conan profile show

      # ── 4. Conan package cache ────────────────────────────────────────────
      # Key encodes OS + compiler version + build type + dependency manifest.
      # Cache restores saves ~15 min of boost compilation on cache hit.
      - name: Restore Conan package cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-ubuntu24-gcc13-debug-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan2-ubuntu24-gcc13-debug-

      # ── 5. Install Conan dependencies ─────────────────────────────────────
      # Use a separate output folder so we never touch the committed build/
      # directory (which contains developer-local absolute paths in
      # CMakeCache.txt and CMakePresets.json).
      - name: Install Conan dependencies
        run: |
          conan install . \
            --build=missing \
            --output-folder=build_ci \
            --settings=build_type=Debug

      # ── 6. CMake configure ────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -S . -B build_ci \
            -DCMAKE_TOOLCHAIN_FILE=build_ci/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Debug

      # ── 7. Build main binary ──────────────────────────────────────────────
      - name: Build c2pool
        run: cmake --build build_ci --target c2pool -j$(nproc)

      # ── 8. Build test targets ─────────────────────────────────────────────
      - name: Build tests
        run: |
          cmake --build build_ci \
            --target test_hardening test_share_messages test_coin_broadcaster \
                    test_redistribute_address \
                    core_test sharechain_test share_test \
            -j$(nproc)

      # ── 9. Run test suite ─────────────────────────────────────────────────
      - name: Run tests
        working-directory: build_ci
        run: ctest --output-on-failure -j$(nproc)

      # ── 10. Upload test results on failure ───────────────────────────────
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: build_ci/Testing/
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # c2pool-qt Desktop GUI builds
  # ══════════════════════════════════════════════════════════════════════════

  qt-linux:
    name: Qt GUI / Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtbase'
          cache: true

      - name: Configure
        run: cmake -S ui/c2pool-qt -B build-qt -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-qt -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: c2pool-qt-linux-x86_64
          path: build-qt/c2pool-qt
          retention-days: 14

  qt-macos:
    name: Qt GUI / macOS arm64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 6
        run: brew install qt@6

      - name: Configure
        run: |
          cmake -S ui/c2pool-qt -B build-qt \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6)

      - name: Build
        run: cmake --build build-qt -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: c2pool-qt-macos-arm64
          path: build-qt/c2pool-qt.app
          retention-days: 14

  qt-windows:
    name: Qt GUI / Windows x86_64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          modules: 'qtbase'
          cache: true

      - name: Configure
        run: cmake -S ui/c2pool-qt -B build-qt -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build-qt --config Release

      - name: Deploy Qt DLLs
        run: |
          windeployqt build-qt/Release/c2pool-qt.exe --release --no-translations

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: c2pool-qt-windows-x86_64
          path: build-qt/Release/
          retention-days: 14
