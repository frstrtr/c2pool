name: CI

on:
  push:
    branches: [master, btc-embedded, dash-spv-embedded, dgb/**, windows-build, service-update]
    tags: ['v*']
  pull_request:
    branches: [master, btc-embedded, dash-spv-embedded, dgb/**]

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Test-allowlist drift-guard (fast, no build): every per-coin test executable
  # declared in src/impl/<coin>/test/CMakeLists.txt must appear in a build.yml
  # --target list, else it becomes a NOT_BUILT CTest sentinel that silently
  # passes (the DGB #137 / test_dgb_subsidy class that red'd master).
  # ════════════════════════════════════════════════════════════════════════════
  test-allowlist-guard:
    name: Test allowlist drift-guard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check coin test targets vs build.yml --target allowlist
        run: python3 tools/ci/check_test_target_allowlist.py
  # ════════════════════════════════════════════════════════════════════════════
  # Linux (Ubuntu 24.04, GCC 13, Conan)
  # ════════════════════════════════════════════════════════════════════════════
  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make libleveldb-dev libsecp256k1-dev

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          sed -i 's/compiler.cppstd=.*/compiler.cppstd=20/' "$(conan profile path default)"

      - name: Restore Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-ubuntu24-gcc13-${{ hashFiles('conanfile.txt') }}

      - name: Conan install
        run: conan install . --build=missing --output-folder=build_ci --settings=build_type=Release

      - name: Configure
        run: cmake -S . -B build_ci -DCMAKE_TOOLCHAIN_FILE=build_ci/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DCOIN_DGB=ON

      - name: Build
        run: cmake --build build_ci --target c2pool -j$(nproc)

      - name: Build tests
        run: |
          cmake --build build_ci \
            --target test_hardening test_share_messages test_coin_broadcaster \
                    test_redistribute_address test_redistribute test_auto_ratchet \
                    test_stratum_extensions \
                    core_test sharechain_test share_test btc_share_test \
                    test_threading test_weights \
                    test_header_chain test_mempool test_template_builder \
                    test_doge_chain test_compact_blocks test_dash_x11_kat \
                    test_dash_header_chain test_dash_block_replay test_dash_conformance test_dash_subsidy test_dash_mempool test_dash_simplifiedmns test_dash_quorum test_dash_quorum_root test_dash_mn_state test_dash_embedded_gbt test_dash_smldiff \
                    test_multiaddress_pplns test_pplns_stress \
                    test_hash_link test_decay_pplns \
                    test_pplns_consensus \
                    test_v36_script_sorting test_v36_cross_impl_refhash \
                    test_phase4_embedded \
                    test_mweb_builder \
                    test_address_resolution test_compute_share_target \
                    test_utxo test_dgb_subsidy test_dgb_coinbase_value dgb_share_test dgb_redistribute_test dgb_block_assembly_test dgb_header_sample_build_test dgb_header_ingest_test dgb_mempool_ingest_test \
                    dgb_gentx_coinbase_test dgb_connection_coinbase_test dgb_pplns_payout_split_test nmc_auxpow_merkle_test nmc_template_builder_test nmc_auxpow_wire_test nmc_reconstruct_won_block_test dgb_gentx_share_path_test dgb_conn_pplns_producer_test dgb_other_tx_resolver_test \
                    dgb_other_tx_assembler_test dgb_reconstruct_won_block_test dgb_reconstruct_closure_test dgb_gentx_unpack_test dgb_work_source_test dgb_template_builder_test dgb_embedded_coin_node_test dgb_embedded_tx_select_test dgb_template_other_txs_test dgb_coinbase_value_parity_test dgb_submit_classify_test dgb_aux_parent_coinbase_parity_test dgb_template_capture_test dgb_aux_doge_db_commitment_bind_test \
                    rpc_request_test softfork_check_test genesis_check_test algo_select_test digishield_walk_test header_chain_test \
                    dgb_coin_node_seam_test dgb_block_broadcast_test dgb_won_block_dispatch_test dgb_forced_won_share_dualpath_test dgb_scrypt_pow_test dgb_nonce_grinder_test dgb_regrind_block_test dgb_won_block_finalize_test dgb_share_target_genesis_test dgb_pool_msg_wire_test dgb_get_shares_walk_test dgb_download_stops_test dgb_think_p1_walk_bounds_test dgb_think_p1_desired_emit_test dgb_think_p6_desired_cutoff_test v37_test \
            -j$(nproc)

      - name: Run tests
        working-directory: build_ci
        run: ctest --output-on-failure -j$(nproc) --exclude-regex "LiveTest\."

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="c2pool-${VERSION}-linux-x86_64"
          mkdir -p "${PKG}/lib" "${PKG}/config" "${PKG}/web-static" "${PKG}/explorer"
          cp build_ci/src/c2pool/c2pool "${PKG}/"
          strip "${PKG}/c2pool"
          for lib in libleveldb.so.1 libsecp256k1.so.2 libsnappy.so.1; do
            found=$(find /usr/lib -name "${lib}*" -type f 2>/dev/null | head -1)
            [ -n "$found" ] && cp "$found" "${PKG}/lib/"
          done
          cp start.sh "${PKG}/" && chmod +x "${PKG}/start.sh"
          cp config/c2pool_mainnet.yaml "${PKG}/config/c2pool_mainnet.yaml.example" || true
          cp config/c2pool_testnet.yaml "${PKG}/config/" || true
          cp -r web-static/* "${PKG}/web-static/"
          cp explorer/explorer.py "${PKG}/explorer/"
          tar czf "${PKG}.tar.gz" "${PKG}/"
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: c2pool-*-linux-x86_64.tar.gz*

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with: { name: test-results-linux, path: build_ci/Testing/, retention-days: 7 }

  # ════════════════════════════════════════════════════════════════════════════
  # Linux AddressSanitizer + UBSan (informational, not gating yet)
  #
  # Builds c2pool + the full test suite with -fsanitize=address,undefined and
  # runs ctest under ASAN/UBSAN_OPTIONS. Catches use-after-free, heap overflow,
  # uninitialized read, integer overflow, etc. at PR time instead of via 12-h
  # soaks. Conan deps stay un-sanitized (static libs); libasan still intercepts
  # all allocations including those from deps, so UAFs that touch our code are
  # caught.
  #
  # Currently `continue-on-error: true` so reports are visible without blocking
  # merges while we work through the audit (Phase 1 of the socket-lifecycle
  # fundamental fix; see frstrtr/the/docs/c2pool-socket-lifecycle-fundamental-fix.md).
  # Will flip to required once known UAFs are fixed (Phase 7).
  # ════════════════════════════════════════════════════════════════════════════
  linux-asan:
    name: Linux x86_64 (AsAN+UBSan)
    # dash bring-up slices may opt out of sanitizers via dash-skip-sanitizers; KEEP for consensus/payout slices (default = on)
    if: ${{ !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dash-skip-sanitizers')) }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make libleveldb-dev libsecp256k1-dev

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          sed -i 's/compiler.cppstd=.*/compiler.cppstd=20/' "$(conan profile path default)"

      - name: Restore Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-ubuntu24-gcc13-${{ hashFiles('conanfile.txt') }}

      - name: Conan install
        run: conan install . --build=missing --output-folder=build_asan --settings=build_type=Release

      - name: Configure (Release + AsAN + UBSan)
        # NOTE 1: must match the build_type passed to `conan install` (Release).
        # Conan generates `*-Target-release.cmake` with INTERFACE_INCLUDE_DIRECTORIES
        # wrapped in $<$<CONFIG:Release>:...>, so a mismatched cmake build type
        # (e.g. RelWithDebInfo) silently drops every conan dep's include path.
        # We get full optimization + debug symbols via -g in CXX_FLAGS.
        #
        # NOTE 2: -fno-sanitize=vptr disables the UBSan vptr check, which would
        # require leveldb (and other foreign polymorphic types) to expose their
        # typeinfo. leveldb is built without that, causing "undefined reference
        # to typeinfo for leveldb::DB" link errors. All other UBSan checks
        # remain on.
        run: |
          cmake -S . -B build_asan \
            -DCMAKE_TOOLCHAIN_FILE=build_asan/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOIN_DGB=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr -fno-omit-frame-pointer -fno-sanitize-recover=undefined -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr"

      - name: Build c2pool + tests
        run: |
          cmake --build build_asan \
            --target c2pool \
                    test_hardening test_share_messages \
                    test_redistribute_address test_redistribute test_auto_ratchet \
                    test_stratum_extensions \
                    core_test sharechain_test share_test btc_share_test \
                    test_threading test_weights \
                    test_header_chain test_mempool test_template_builder \
                    test_doge_chain test_compact_blocks test_dash_x11_kat \
                    test_dash_header_chain test_dash_block_replay test_dash_conformance test_dash_subsidy test_dash_mempool test_dash_simplifiedmns test_dash_quorum test_dash_quorum_root test_dash_mn_state test_dash_embedded_gbt test_dash_smldiff \
                    test_hash_link test_decay_pplns \
                    test_pplns_consensus \
                    test_v36_script_sorting test_v36_cross_impl_refhash \
                    test_phase4_embedded \
                    test_mweb_builder \
                    test_address_resolution test_compute_share_target \
                    test_utxo test_dgb_subsidy test_dgb_coinbase_value dgb_share_test dgb_redistribute_test dgb_block_assembly_test dgb_header_sample_build_test dgb_header_ingest_test dgb_mempool_ingest_test \
                    dgb_gentx_coinbase_test dgb_connection_coinbase_test dgb_pplns_payout_split_test nmc_auxpow_merkle_test nmc_template_builder_test nmc_auxpow_wire_test nmc_reconstruct_won_block_test dgb_gentx_share_path_test dgb_conn_pplns_producer_test dgb_other_tx_resolver_test \
                    dgb_other_tx_assembler_test dgb_reconstruct_won_block_test dgb_reconstruct_closure_test dgb_gentx_unpack_test dgb_work_source_test dgb_template_builder_test dgb_embedded_coin_node_test dgb_embedded_tx_select_test dgb_template_other_txs_test dgb_coinbase_value_parity_test dgb_submit_classify_test dgb_aux_parent_coinbase_parity_test dgb_template_capture_test dgb_aux_doge_db_commitment_bind_test \
                    rpc_request_test softfork_check_test genesis_check_test algo_select_test digishield_walk_test header_chain_test \
                    dgb_coin_node_seam_test dgb_block_broadcast_test dgb_won_block_dispatch_test dgb_forced_won_share_dualpath_test dgb_scrypt_pow_test dgb_nonce_grinder_test dgb_regrind_block_test dgb_won_block_finalize_test dgb_share_target_genesis_test dgb_pool_msg_wire_test dgb_get_shares_walk_test dgb_download_stops_test dgb_think_p1_walk_bounds_test dgb_think_p1_desired_emit_test dgb_think_p6_desired_cutoff_test test_coin_broadcaster test_multiaddress_pplns test_pplns_stress \
                    v37_test \
            -j$(nproc)

      - name: Run tests under sanitizers
        working-directory: build_asan
        env:
          ASAN_OPTIONS: detect_leaks=0:check_initialization_order=1:strict_string_checks=1:abort_on_error=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0
        run: ctest --output-on-failure -j$(nproc) --exclude-regex "LiveTest\."

      - name: Upload sanitizer test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with: { name: test-results-linux-asan, path: build_asan/Testing/, retention-days: 7 }

  # ════════════════════════════════════════════════════════════════════════════
  # COIN_BCH leg — Bitcoin Cash (SHA256d standalone parent, V36)
  #
  # Dedicated per-coin leg (integrator 2026-06-19 decision). build.yml previously
  # configured ONLY -DCOIN_DGB=ON, so the 15 bch_ M5 targets never compiled and a
  # gh rollup reported GREEN while exercising ZERO BCH — a false-green merge gate
  # (the DGB #137 NOT_BUILT shape, but 15 targets, not one). Coin flags are
  # additive independent if() guards (no mutual-exclusion), so -DCOIN_BCH=ON
  # composes with COIN_DGB in one configure — but BCH ships its own c2pool-bch
  # binary + its own 15 test targets, so a separate configure/leg is the clean
  # per-coin signal: a BCH break reads as "COIN_BCH leg red," not buried in DGB.
  # Mirrors the DGB linux/linux-asan coverage. Does NOT relax the per-coin
  # source-presence guards (PR #47). ctest scoped to ^bch_ (network-free; the
  # live VM300 IBD path lives in the c2pool-bch --ibd harness, not in ctest).
  # ════════════════════════════════════════════════════════════════════════════
  coin-bch:
    name: COIN_BCH Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make libleveldb-dev libsecp256k1-dev

      - uses: actions/setup-python@v6
        with: { python-version: 3.12 }

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          sed -i 's/compiler.cppstd=.*/compiler.cppstd=20/' "$(conan profile path default)"

      - name: Restore Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-ubuntu24-gcc13-bch-${{ hashFiles('conanfile.txt') }}

      - name: Conan install
        run: conan install . --build=missing --output-folder=build_bch --settings=build_type=Release

      - name: Configure (-DCOIN_BCH=ON)
        run: cmake -S . -B build_bch -DCMAKE_TOOLCHAIN_FILE=build_bch/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DCOIN_BCH=ON

      - name: Build c2pool-bch binary
        run: cmake --build build_bch --target c2pool-bch -j$(nproc)

      - name: Build BCH test targets
        run: |
          cmake --build build_bch \
            --target bch_abla_floor_invariant_test bch_abla_block_feed_test \
                    bch_abla_block_feed_gap_test bch_header_sync_test \
                    bch_header_sync_progress_test bch_block_download_test \
                    bch_genesis_conformance_test bch_abla_growth_soak_test \
                    bch_coinbase_kat_segwit_predicate_test \
                    bch_coinbase_kat_bytevector_test \
                    bch_cashtokens_transparency_test \
                    bch_block_connector_test bch_block_ordering_test \
                    bch_utxo_connect_test bch_reorg_connect_test bch_reorg_rerequest_test \
                    bch_compact_block_connector_test \
                    bch_embedded_daemon_assembly_test \
                    bch_embedded_getwork_test bch_embedded_seam_workview_test \
                    bch_embedded_block_broadcast_test bch_coin_node_seam_test \
                    bch_asert_kat_test \
            -j$(nproc)

      - name: Run BCH tests
        working-directory: build_bch
        run: ctest --output-on-failure -j$(nproc) -R "^bch_"

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with: { name: test-results-coin-bch, path: build_bch/Testing/, retention-days: 7 }

  # ════════════════════════════════════════════════════════════════════════════
  # COIN_BCH AddressSanitizer + UBSan (informational, mirrors linux-asan posture)
  # ════════════════════════════════════════════════════════════════════════════
  coin-bch-asan:
    name: COIN_BCH Linux x86_64 (AsAN+UBSan)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make libleveldb-dev libsecp256k1-dev

      - uses: actions/setup-python@v6
        with: { python-version: 3.12 }

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          sed -i 's/compiler.cppstd=.*/compiler.cppstd=20/' "$(conan profile path default)"

      - name: Restore Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-ubuntu24-gcc13-bch-${{ hashFiles('conanfile.txt') }}

      - name: Conan install
        run: conan install . --build=missing --output-folder=build_bch_asan --settings=build_type=Release

      - name: Configure (Release + AsAN + UBSan, -DCOIN_BCH=ON)
        run: |
          cmake -S . -B build_bch_asan \
            -DCMAKE_TOOLCHAIN_FILE=build_bch_asan/conan_toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOIN_BCH=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr -fno-omit-frame-pointer -fno-sanitize-recover=undefined -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined -fno-sanitize=vptr"

      - name: Build c2pool-bch + BCH tests
        run: |
          cmake --build build_bch_asan \
            --target c2pool-bch \
                    bch_abla_floor_invariant_test bch_abla_block_feed_test \
                    bch_abla_block_feed_gap_test bch_header_sync_test \
                    bch_header_sync_progress_test bch_block_download_test \
                    bch_genesis_conformance_test bch_abla_growth_soak_test \
                    bch_coinbase_kat_segwit_predicate_test \
                    bch_coinbase_kat_bytevector_test \
                    bch_cashtokens_transparency_test \
                    bch_block_connector_test bch_block_ordering_test \
                    bch_utxo_connect_test bch_reorg_connect_test bch_reorg_rerequest_test \
                    bch_compact_block_connector_test \
                    bch_embedded_daemon_assembly_test \
                    bch_embedded_getwork_test bch_embedded_seam_workview_test \
                    bch_embedded_block_broadcast_test bch_coin_node_seam_test \
                    bch_asert_kat_test \
            -j$(nproc)

      - name: Run BCH tests under sanitizers
        working-directory: build_bch_asan
        env:
          ASAN_OPTIONS: detect_leaks=0:check_initialization_order=1:strict_string_checks=1:abort_on_error=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0
        run: ctest --output-on-failure -j$(nproc) -R "^bch_"

      - name: Upload sanitizer test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with: { name: test-results-coin-bch-asan, path: build_bch_asan/Testing/, retention-days: 7 }

  # ════════════════════════════════════════════════════════════════════════════
  # Web-static JS verify (typecheck + build + tests + bundle-size gate)
  # Covers web-static/sharechain-explorer/: the Explorer + PPLNS View
  # bundles + Plugin SDK. Fast job (< 1 min); runs regardless of path so
  # it also catches changes that land via package.json or test fixtures.
  # ════════════════════════════════════════════════════════════════════════════
  web-static:
    name: Web-static verify
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web-static/sharechain-explorer
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          # Node 22 — node --test supports glob expansion natively
          # (Node 20 requires the shell to pre-expand the quoted glob,
          # which fails on CI's bash + JSON-quoted package.json script).
          node-version: '22'
          cache: npm
          cache-dependency-path: web-static/sharechain-explorer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify (typecheck + build + test + manifest + size)
        run: npm run verify

      - name: Install Chrome for pixel-regression harness
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable || \
          sudo apt-get install -y --no-install-recommends chromium-browser
          # Export the first one that exists so capture.mjs picks it up.
          for bin in /usr/bin/google-chrome-stable /usr/bin/google-chrome /usr/bin/chromium /usr/bin/chromium-browser; do
            if [ -x "$bin" ]; then
              echo "CHROME_BIN=$bin" >> "$GITHUB_ENV"
              break
            fi
          done

      - name: Visual pixel-diff harness
        run: npm run visual

      - name: Upload visual diff artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff-out
          path: web-static/sharechain-explorer/tests/visual/out/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # c2pool-qt leak-regression harness (Qt hybrid step 14, delta v1 §E.2)
  # Builds ui/c2pool-qt/ with C2POOL_QT_BUILD_TESTS=ON and runs the
  # mount/destroy × 100 harness under xvfb.
  #
  # PARTIAL COVERAGE. Configure + build are gating: API breakage in
  # PageEmbedded::destroyView or its Qt dependencies will fail compile
  # and block merge. That alone catches the most common class of
  # regression (a refactor renaming/removing a destroyView hook).
  #
  # The runtime mount/destroy × 100 step is `continue-on-error: true`
  # because QtWebEngine 6.4.2 (Ubuntu 24.04 apt package) segfaults
  # inside Chromium's child-process init on GitHub's GPU-less runners
  # regardless of software-GL / headless / sandbox flags — tried
  # LIBGL_ALWAYS_SOFTWARE, QT_OPENGL=software, --use-gl=swiftshader,
  # --disable-gpu, --headless=new, xvfb-run with GLX,
  # QTWEBENGINE_DISABLE_SANDBOX. All produce the same 2-second-after-
  # banner SIGSEGV. The lifecycle logic is code-verified against
  # PageEmbedded::destroyView + Qt parent/child semantics; the harness
  # is expected to pass on any non-Wayland dev box or a self-hosted CI
  # runner with working QtWebEngine headless support.
  #
  # To flip the runtime step back to gating, remove `continue-on-error: true`
  # once one of:
  #   - Ubuntu PPA ships QtWebEngine ≥ 6.6 with better headless
  #   - Self-hosted runner with a working Qt6 WebEngine is available
  #   - Alternative harness drops QWebEngineView mount (mocks the
  #     Chromium init) while still exercising destroyView lifecycle
  # ════════════════════════════════════════════════════════════════════════════
  qt-webengine:
    name: Qt WebEngine leak gate
    runs-on: ubuntu-24.04
    # Hard ceiling: orphaned QtWebEngine/Chromium helper children survive
    # the inner `timeout 180`, holding the xvfb pipe open and hanging the
    # job to the 360-min runner default. Cap it so a hung leak gate is
    # force-killed (with its whole process tree) in minutes, not hours.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt6 + WebEngine + xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake g++ \
            qt6-base-dev qt6-webengine-dev qt6-webchannel-dev \
            qt6-tools-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-dev libnss3 libxcomposite1 libxdamage1 \
            libxrandr2 libxtst6 libatk1.0-0 libatk-bridge2.0-0 \
            libasound2t64 libdrm2 libgbm1 \
            xvfb

      - name: Configure
        run: cmake -S ui/c2pool-qt -B build-qt -DC2POOL_QT_BUILD_TESTS=ON

      - name: Build leak harness
        run: cmake --build build-qt --target c2pool-qt_test_embedded_leak -j$(nproc)

      - name: Run leak harness under xvfb
        continue-on-error: true
        env:
          QTWEBENGINE_DISABLE_SANDBOX: '1'
          # Force software GL throughout — the GitHub Ubuntu runner
          # has no GPU, so QtWebEngine's default `use-gl desktop` fails
          # as soon as Chromium tries to get an OpenGL context. Mesa
          # swrast serves as a CPU fallback.
          LIBGL_ALWAYS_SOFTWARE: '1'
          QT_OPENGL: software
          QT_QUICK_BACKEND: software
          # --disable-software-rasterizer contradicted --use-gl=swiftshader
          # in the previous attempt (banner showed "GL Type: disabled" then
          # Chromium helper still died). Drop it; let swiftshader handle
          # raster. Add --headless for the Chromium-side headless mode.
          QTWEBENGINE_CHROMIUM_FLAGS: >-
            --no-sandbox
            --disable-gpu
            --disable-dev-shm-usage
            --use-gl=swiftshader
            --headless=new
        run: |
          xvfb-run -a --server-args="-screen 0 1280x800x24 +extension GLX +render -noreset" \
            timeout 180 ./build-qt/c2pool-qt_test_embedded_leak

  # ════════════════════════════════════════════════════════════════════════════
  # BTC embedded smoke — RETIRED 2026-06-17 (ci-steward/retire-btc-linux).
  # Superseded by the coin-matrix.yml `btc` cell ("btc smoke (Linux x86_64)",
  # a required check on master). The old btc-linux job was gated solely to
  # btc-embedded branch involvement and never fired on master, so removing it
  # changes no live coverage.
  #
  # Deferred btc test wiring (owned by the btc-heap-opt arc):
  #   - src/impl/btc/test/share_test.cpp — NOW WIRED as the btc_share_test target
  #     (F11 value-invariance KAT); uniquely named to avoid CMP0002 vs ltc share_test.
  #   - src/impl/btc/test/template_parity_test.cpp — standalone consensus
  #     oracle harness; needs proper CMake target wiring (nlohmann_json,
  #     leveldb_store, core/log) to be CI-reliable.
  # ════════════════════════════════════════════════════════════════════════════

  # ════════════════════════════════════════════════════════════════════════════
  # macOS (matrix: arm64 on GitHub-hosted macos-14, x86_64 on the self-hosted
  # Intel runner labeled c2pool-mac-intel). The self-hosted lane resolves the
  # macOS x86_64 CI starvation (#42) — macpro-intel-204 standup 2026-06-16.
  # ════════════════════════════════════════════════════════════════════════════
  macos:
    name: macOS ${{ matrix.arch }}
    # dash-slice campaign: skip macOS for PRs carrying the dash-linux-only label (re-enabled at block-viable gate, ~07-01)
    if: ${{ !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dash-linux-only')) }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: [self-hosted, macOS, X64, c2pool-mac-intel]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew PATH
        # Self-hosted Intel runner (macpro-intel-204) launches the Actions
        # service from launchd, whose PATH omits Homebrew's /usr/local/bin
        # (#100: brew exit 127). GitHub-hosted arm64 keeps /opt/homebrew on PATH.
        # Append whichever prefix actually has brew so every later step
        # (cmake, brew --prefix) inherits it via $GITHUB_PATH.
        run: |
          if [ -x /opt/homebrew/bin/brew ]; then
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          elif [ -x /usr/local/bin/brew ]; then
            echo "/usr/local/bin" >> "$GITHUB_PATH"
          else
            echo "::error::Homebrew not found at /opt/homebrew or /usr/local on ${RUNNER_NAME:-runner}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: brew install cmake boost leveldb secp256k1 nlohmann-json yaml-cpp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target c2pool -j$(sysctl -n hw.ncpu)

      - name: Verify binary
        run: file build/src/c2pool/c2pool && build/src/c2pool/c2pool --help 2>&1 | head -3

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="c2pool-${VERSION}-macos-${{ matrix.arch }}"
          BREW="$(brew --prefix)"
          mkdir -p "${PKG}/lib" "${PKG}/config" "${PKG}/web-static" "${PKG}/explorer"
          cp build/src/c2pool/c2pool "${PKG}/"
          strip "${PKG}/c2pool"
          for dylib in $(otool -L "${PKG}/c2pool" | grep "${BREW}" | awk '{print $1}'); do
            base=$(basename "$dylib")
            cp "$dylib" "${PKG}/lib/${base}"
            install_name_tool -change "$dylib" "@executable_path/lib/${base}" "${PKG}/c2pool"
          done
          for lib in "${PKG}"/lib/*.dylib; do
            for ref in $(otool -L "$lib" | grep "${BREW}" | awk '{print $1}'); do
              base=$(basename "$ref")
              [ -f "${PKG}/lib/${base}" ] && install_name_tool -change "$ref" "@executable_path/lib/${base}" "$lib"
            done
            install_name_tool -id "@executable_path/lib/$(basename $lib)" "$lib"
          done
          cp start.sh "${PKG}/" && chmod +x "${PKG}/start.sh"
          cp config/c2pool_mainnet.yaml "${PKG}/config/c2pool_mainnet.yaml.example" || true
          cp -r web-static/* "${PKG}/web-static/"
          cp explorer/explorer.py "${PKG}/explorer/"
          zip -r "${PKG}.zip" "${PKG}/"
          shasum -a 256 "${PKG}.zip" > "${PKG}.zip.sha256"

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}
          path: c2pool-*-macos-${{ matrix.arch }}.zip*

  # ════════════════════════════════════════════════════════════════════════════
  # Windows (MSVC 2022, Conan)
  # ════════════════════════════════════════════════════════════════════════════
  windows:
    name: Windows x86_64
    # dash-slice campaign: skip Windows for PRs carrying the dash-linux-only label (re-enabled at block-viable gate, ~07-01)
    if: ${{ !(github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'dash-linux-only')) }}
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          $profile = conan profile path default
          (Get-Content $profile) -replace 'compiler.cppstd=14','compiler.cppstd=20' | Set-Content $profile

      - name: Restore Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-windows-msvc194-${{ hashFiles('conanfile.txt') }}

      - name: Conan install
        run: conan install . --build=missing --output-folder=build_ci

      - name: Build secp256k1
        run: |
          git clone https://github.com/bitcoin-core/secp256k1 secp256k1-src
          cmake -B secp256k1-src/build -S secp256k1-src -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${env:GITHUB_WORKSPACE}/secp256k1" -DSECP256K1_BUILD_TESTS=OFF -DSECP256K1_BUILD_EXHAUSTIVE_TESTS=OFF -DSECP256K1_BUILD_BENCHMARK=OFF -DSECP256K1_BUILD_EXAMPLES=OFF
          cmake --build secp256k1-src/build --config Release
          cmake --install secp256k1-src/build --config Release

      - name: Configure
        shell: cmd
        run: cmake -S . -B build_ci -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=build_ci/conan_toolchain.cmake -DCMAKE_PREFIX_PATH="%GITHUB_WORKSPACE%/secp256k1" -DCMAKE_CXX_FLAGS="/D_WIN32_WINNT=0x0A00"

      - name: Build
        shell: cmd
        run: cmake --build build_ci --target c2pool --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Verify binary
        run: |
          Copy-Item "${env:GITHUB_WORKSPACE}/secp256k1/bin/libsecp256k1-6.dll" build_ci/src/c2pool/Release/
          build_ci/src/c2pool/Release/c2pool.exe --help 2>&1 | Select-Object -First 3

      - name: Package release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $PKG = "c2pool-${VERSION}-windows-x86_64"
          New-Item -ItemType Directory -Path "${PKG}/lib","${PKG}/config","${PKG}/web-static","${PKG}/explorer" -Force
          Copy-Item build_ci/src/c2pool/Release/c2pool.exe "${PKG}/"
          # DLL must be next to exe for Windows DLL search path (portable ZIP)
          # Also copy to lib/ for Inno Setup installer compatibility
          Copy-Item "${env:GITHUB_WORKSPACE}/secp256k1/bin/libsecp256k1-6.dll" "${PKG}/"
          Copy-Item "${env:GITHUB_WORKSPACE}/secp256k1/bin/libsecp256k1-6.dll" "${PKG}/lib/"
          Copy-Item start.bat "${PKG}/"
          Copy-Item -Recurse web-static/* "${PKG}/web-static/"
          Copy-Item explorer/explorer.py "${PKG}/explorer/"
          Copy-Item config/c2pool_mainnet.yaml "${PKG}/config/c2pool_mainnet.yaml.example"
          Copy-Item config/c2pool_testnet.yaml "${PKG}/config/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "${PKG}" -DestinationPath "${PKG}.zip"
          (Get-FileHash "${PKG}.zip" -Algorithm SHA256).Hash + "  ${PKG}.zip" | Out-File "${PKG}.zip.sha256" -Encoding ascii

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: c2pool-*-windows-x86_64.zip*

  # ════════════════════════════════════════════════════════════════════════════
  # COIN_DGB + AUX_DOGE=ON (dual-parent stretch seam, phase DA) — keeps the
  # opt-in seam landed in #310 from rotting dark: a configure flag with no CI
  # coverage drifts silently. This arm configures c2pool-dgb with the flag ON
  # so the node.hpp #ifdef AUX_DOGE seam is compiled on every PR. Default build
  # (flag OFF) is unchanged and still covered by the linux + dgb-smoke jobs.
  # ════════════════════════════════════════════════════════════════════════════
  coin-dgb-auxdoge:
    name: COIN_DGB +AUX_DOGE Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ cmake make libleveldb-dev libsecp256k1-dev

      - uses: actions/setup-python@v6
        with: { python-version: 3.12 }

      - name: Install Conan 2
        run: pip install "conan>=2.0,<3.0"

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          sed -i 's/compiler.cppstd=.*/compiler.cppstd=20/' "$(conan profile path default)"

      - name: Restore Conan cache
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan2-ubuntu24-gcc13-dgb-auxdoge-${{ hashFiles('conanfile.txt') }}

      - name: Conan install
        run: conan install . --build=missing --output-folder=build_dgb_auxdoge --settings=build_type=Release

      - name: Configure (-DCOIN_DGB=ON -DAUX_DOGE=ON)
        run: cmake -S . -B build_dgb_auxdoge -DCMAKE_TOOLCHAIN_FILE=build_dgb_auxdoge/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Release -DCOIN_DGB=ON -DAUX_DOGE=ON

      - name: Build c2pool-dgb binary (AUX_DOGE seam ON)
        run: cmake --build build_dgb_auxdoge --target c2pool-dgb -j$(nproc)

      - name: Smoke test (--help)
        run: |
          BIN=build_dgb_auxdoge/src/c2pool/c2pool-dgb
          file "$BIN"
          "$BIN" --help 2>&1 | head -5 || true

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: coin-dgb-auxdoge-fail
          path: |
            build_dgb_auxdoge/CMakeFiles/CMakeOutput.log
            build_dgb_auxdoge/CMakeFiles/CMakeError.log
          retention-days: 7
          if-no-files-found: ignore

  # Releases are built and published manually (not via CI).
  # See installer/ for packaging scripts (DMG, ZIP, Inno Setup).
